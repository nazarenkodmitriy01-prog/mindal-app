    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22170%22%20height%3D%2295%22%3E%0A%3Ctext%20x%3D%2285%22%20y%3D%2255%22%20font-family%3D%22Roboto%2C%20Arial%2C%20sans-serif%22%20font-size%3D%2226%22%20font-weight%3D%22700%22%20fill%3D%22rgba%28214%2C148%2C102%2C0.16%29%22%20text-anchor%3D%22middle%22%20transform%3D%22rotate%28-28%2085%2047%29%22%3EMINDAL%3C/text%3E%0A%3C/svg%3E");
  }
  #payroll-root { position: relative; z-index: 1; }
  #payroll-root {
    --ink: #1C1F1D;
    --ink-soft: #5A5F5A;
    --paper: #EEF0EC;
    --card: #FFFFFF;
    --line: #DAD8D2;
    --rust: #A15C33;
    --rust-soft: #EADACD;
    --green: #3F6B4A;
    --green-soft: #E1EBE3;
    --red: #B23A34;
    --red-soft: #F4DEDC;
    --c-bar: #5C6B73;
    --c-waiters: #8A6D3B;
    --c-hookah: #6B4E71;
    --c-hostess: #5C7A6B;
    --c-wash: #4E7A8A;
    --c-kitchen: #7A5138;
    --c-mgmt: #4A4A4A;

    --border-card: #E2E0D5;
    --border-input: #D8D6CC;
    --bg-highlight: #F8F7F2;
    --bg-input: #FCFCFA;
    --bg-subtle: #F3F2EC;
    --border-subtle: #F0EFE8;
    --bg-chip-off: #EFEDE3;
    --border-row: #EEEDE6;
    --border-dashed: #C9C7BB;
    --text-faint: #B7B5A9;

    transition: background 0.2s ease, color 0.2s ease;
    font-family: 'Roboto', -apple-system, sans-serif;
    color: var(--ink);
    background: var(--paper);
    padding: 18px;
    border-radius: 10px;
    max-width: 1020px;
    margin: 0 auto;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }
  /* ---- Диагональный водяной знак MINDAL, плывущий по фону ---- */
  #payroll-root::before {
    content: "";
    position: absolute;
    inset: -140px;
    z-index: -1;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22170%22%20height%3D%2295%22%3E%0A%3Ctext%20x%3D%2285%22%20y%3D%2255%22%20font-family%3D%22Roboto%2C%20Arial%2C%20sans-serif%22%20font-size%3D%2226%22%20font-weight%3D%22700%22%20fill%3D%22rgba%28161%2C92%2C51%2C0.18%29%22%20text-anchor%3D%22middle%22%20transform%3D%22rotate%28-28%2085%2047%29%22%3EMINDAL%3C/text%3E%0A%3C/svg%3E");
    background-repeat: repeat;
    background-size: 170px 95px;
    animation: mindalDrift 34s linear infinite;
    will-change: background-position;
  }
  #payroll-root.theme-dark::before {
    background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22170%22%20height%3D%2295%22%3E%0A%3Ctext%20x%3D%2285%22%20y%3D%2255%22%20font-family%3D%22Roboto%2C%20Arial%2C%20sans-serif%22%20font-size%3D%2226%22%20font-weight%3D%22700%22%20fill%3D%22rgba%28214%2C148%2C102%2C0.16%29%22%20text-anchor%3D%22middle%22%20transform%3D%22rotate%28-28%2085%2047%29%22%3EMINDAL%3C/text%3E%0A%3C/svg%3E");
  }
  @keyframes mindalDrift {
    from { background-position: 0 0; }
    to   { background-position: 340px 190px; }
  }
  #payroll-root * { box-sizing: border-box; }
  #payroll-root input, #payroll-root select, #payroll-root textarea, #payroll-root button {
    color: inherit;
    font-family: inherit;
    background-color: transparent;
  }
  #payroll-root select {
    background-color: var(--card);
  }
  #payroll-root select option {
    background-color: var(--card);
    color: var(--ink);
  }
  #payroll-root .display { font-family: 'Roboto', -apple-system, sans-serif; }
  #payroll-root .mono { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
  #payroll-root .topbar {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  #payroll-root h1 { font-size: 23px; margin: 0; letter-spacing: 0.2px; }
  #payroll-root .sub { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }
  #payroll-root .sync-widget {
    display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-soft);
    background: var(--card); border: 1px solid var(--border-card); border-radius: 20px; padding: 5px 12px 5px 10px;
    white-space: nowrap;
  }
  #payroll-root .sync-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--border-dashed); flex-shrink: 0;
    transition: background 0.2s;
  }
  #payroll-root .sync-dot.saving { background: var(--rust); animation: sync-pulse 1s infinite ease-in-out; }
  #payroll-root .sync-dot.synced { background: var(--green); }
  #payroll-root .sync-dot.error { background: var(--red); }
  #payroll-root .sync-dot.off { background: var(--border-dashed); }
  @keyframes sync-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  #payroll-root .sync-retry {
    border: none; background: none; cursor: pointer; font-size: 14px; color: var(--rust);
    padding: 0; line-height: 1; font-weight: 700;
  }
  #payroll-root .sync-widget-wrap { position: relative; }
  #payroll-root .sync-gear {
    border: none; background: none; cursor: pointer; font-size: 14px; color: var(--ink-soft);
    padding: 0; line-height: 1; margin-left: 2px;
  }
  #payroll-root .sync-gear:hover { color: var(--ink); }
  #payroll-root .sync-config-panel {
    position: absolute; top: calc(100% + 8px); right: 0; z-index: 20;
    background: var(--card); border: 1px solid var(--border-card); border-radius: 8px;
    padding: 14px; width: 320px; box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  }
  #payroll-root .sync-config-panel label {
    display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  #payroll-root .sync-config-panel input {
    display: block; width: 100%; margin-top: 5px; font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; padding: 6px 8px; border: 1px solid var(--border-input); border-radius: 5px;
    text-transform: none; letter-spacing: normal; background: var(--bg-input);
  }
  #payroll-root .sync-config-actions { display: flex; gap: 8px; margin-top: 4px; }
  #payroll-root .sync-config-actions .btn { flex: 1; text-align: center; font-size: 13px; padding: 7px 10px; }
  #payroll-root .sync-config-note { font-size: 11.5px; color: var(--ink-soft); margin-top: 9px; line-height: 1.4; }
  #payroll-root .tabs { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 2px solid var(--border-input); }
  #payroll-root .tab {
    padding: 8px 16px; font-size: 14.5px; font-weight: 600;
    cursor: pointer; color: var(--ink-soft); border-bottom: 2px solid transparent;
    margin-bottom: -2px; user-select: none;
  }
  #payroll-root .tab.active { color: var(--rust); border-bottom-color: var(--rust); }
  #payroll-root .datebar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    background: var(--card); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-card);
  }
  #payroll-root .datebar button.nav {
    background: none; border: 1px solid #CFCDC0; border-radius: 6px;
    width: 30px; height: 30px; cursor: pointer; font-size: 15px; color: var(--ink);
  }
  #payroll-root .datebar input[type=date] {
    font-family: 'IBM Plex Mono', monospace; font-size: 15px; border: none;
    background: transparent; font-weight: 600;
  }
  #payroll-root .datebar .weekday { font-size: 13px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.5px; }
  #payroll-root .revenue-inputs { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  #payroll-root .revenue-box { flex: 1; min-width: 220px; background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; padding: 12px 14px; }
  #payroll-root .revenue-box label { display: block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  #payroll-root .revenue-box input { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 21px; font-weight: 600; border: none; background: transparent; color: var(--ink); padding: 0; }
  #payroll-root .revenue-box input:focus { outline: none; }
  #payroll-root .revenue-box.hookah { background: var(--rust-soft); }

  #payroll-root .dept-card { background: var(--card); border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-card); overflow: hidden; }
  #payroll-root .dept-head { padding: 9px 14px; font-size: 13.5px; font-weight: 700; color: white; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.3px; }
  #payroll-root .dept-head .rule { font-weight: 400; opacity: 0.85; font-size: 12px; }
  #payroll-root .emp-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border-row); flex-wrap: wrap; }
  #payroll-root .emp-row .name { flex: 1; min-width: 140px; font-size: 14.5px; font-weight: 500; }
  #payroll-root .chip { padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; border: 1px solid transparent; white-space: nowrap; }
  #payroll-root .chip.off { background: var(--bg-chip-off); color: var(--ink-soft); }
  #payroll-root .chip.on { background: var(--green-soft); color: var(--green); border-color: #BFD8C6; }
  #payroll-root .time-inputs { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-soft); }
  #payroll-root .time-inputs input[type=time] { font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; border: 1px solid var(--border-input); border-radius: 5px; padding: 3px 5px; background: var(--bg-input); }
  #payroll-root .hours-badge { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink-soft); background: var(--bg-subtle); padding: 3px 8px; border-radius: 5px; }
  #payroll-root .pay-amount { margin-left: auto; font-family: 'IBM Plex Mono', monospace; font-size: 15.5px; font-weight: 700; color: var(--green); min-width: 90px; text-align: right; }
  #payroll-root .pay-amount.zero { color: var(--text-faint); font-weight: 500; }
  #payroll-root .pay-note { margin-left: auto; font-size: 12px; color: var(--ink-soft); font-style: italic; }
  #payroll-root .chef-extra { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
  #payroll-root .chef-extra input[type=number] { width: 54px; font-family: 'IBM Plex Mono', monospace; border: 1px solid var(--border-input); border-radius: 5px; padding: 3px 6px; }
  #payroll-root .bonus-row { display: flex; gap: 14px; padding: 8px 14px 12px; flex-wrap: wrap; border-top: 1px solid var(--border-row); }
  #payroll-root .bonus-row label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--ink-soft); cursor: pointer; }

  #payroll-root .receipt { background: var(--card); border: 1px solid var(--border-card); border-radius: 4px 4px 0 0; margin-top: 22px; padding: 18px 22px 14px; font-family: 'IBM Plex Mono', monospace; position: relative; }
  #payroll-root .receipt::after {
    content: ""; position: absolute; left: 0; right: 0; bottom: -9px; height: 18px;
    background: linear-gradient(-45deg, var(--paper) 9px, transparent 0), linear-gradient(45deg, var(--paper) 9px, transparent 0);
    background-size: 18px 18px; background-repeat: repeat-x; background-color: var(--card);
  }
  #payroll-root .receipt h3 { font-family: 'Roboto', sans-serif; font-size: 15px; text-align: center; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; }
  #payroll-root .receipt .line { display: flex; font-size: 13.5px; margin-bottom: 4px; align-items: baseline; }
  #payroll-root .receipt .line .ln { flex: 1; overflow: hidden; white-space: nowrap; }
  #payroll-root .receipt .line .ln span.dots { display: inline-block; overflow: hidden; letter-spacing: 2px; color: var(--border-dashed); }
  #payroll-root .receipt .line .amt { font-weight: 700; }
  #payroll-root .receipt .line.sub { font-size: 11.5px; color: var(--ink-soft); margin: -2px 0 8px 10px; font-style: italic; }
  #payroll-root .receipt .line.sub .ln { white-space: normal; }
  #payroll-root .receipt .total { border-top: 1px dashed var(--border-dashed); margin-top: 8px; padding-top: 8px; display: flex; justify-content: space-between; font-size: 15.5px; font-weight: 700; }

  #payroll-root .month-select { font-family: 'IBM Plex Mono', monospace; font-size: 15px; padding: 6px 10px; border: 1px solid var(--border-input); border-radius: 6px; background: var(--card); margin-bottom: 14px; }
  #payroll-root table.month-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; font-size: 13.5px; border: 1px solid var(--border-card); }
  #payroll-root table.month-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--ink-soft); padding: 8px 8px; background: var(--bg-subtle); border-bottom: 1px solid var(--border-card); }
  #payroll-root table.month-table td { padding: 7px 8px; border-bottom: 1px solid var(--border-subtle); }
  #payroll-root table.month-table td.num, table.month-table th.num { text-align: right; font-family: 'IBM Plex Mono', monospace; }
  #payroll-root table.month-table tr.total-row td { font-weight: 700; background: var(--bg-highlight); }
  #payroll-root table.month-table.schedule-table { table-layout: fixed; width: 100%; }
  #payroll-root table.schedule-table th, #payroll-root table.schedule-table td { padding: 4px 3px; overflow: hidden; }
  #payroll-root table.schedule-table select.sched-cell {
    width: 100%; min-width: 0; font-size: 11.5px; padding: 4px 2px; border: 1px solid var(--border-input); border-radius: 4px;
  }
  #payroll-root table.schedule-table .sched-slot-label,
  #payroll-root table.schedule-table .sched-slot-time { min-width: 0; }

  /* ---- Задачи и чат руководителей ---- */
  #payroll-root .task-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 14px; }
  #payroll-root .task-column { background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; padding: 10px; min-width: 0; }
  #payroll-root .task-column h4 { margin: 0 0 8px; font-size: 13px; }
  #payroll-root .task-card { background: var(--bg-subtle); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 8px 9px; margin-bottom: 8px; }
  #payroll-root .task-card-title { font-weight: 600; font-size: 12.5px; }
  #payroll-root .task-card-desc { font-size: 11.5px; color: var(--ink-soft); margin-top: 3px; white-space: pre-wrap; }
  #payroll-root .task-status { width: 100%; padding: 4px 6px; border: 1px solid; border-radius: 5px; font-size: 11px; }
  #payroll-root .task-card-meta { font-size: 10px; color: var(--text-faint); margin-top: 6px; }
  #payroll-root .chat-log { max-height: 320px; overflow-y: auto; border: 1px solid var(--border-card); border-radius: 8px; padding: 10px; background: var(--bg-subtle); }
  #payroll-root .chat-msg { margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle); }
  #payroll-root .chat-msg:last-child { border-bottom: none; margin-bottom: 0; }
  #payroll-root .chat-msg-meta { font-size: 10.5px; color: var(--ink-soft); margin-bottom: 2px; }
  #payroll-root .chat-msg-text { font-size: 13px; white-space: pre-wrap; }

  #payroll-root table.month-table td.topay { color: var(--rust); font-weight: 700; }
  #payroll-root .dept-tag { display: inline-block; font-size: 11px; color: white; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
  #payroll-root .kpi-panel { background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
  #payroll-root .kpi-panel h4 { margin: 0 0 10px; font-size: 14px; font-family: 'Roboto', sans-serif; }
  #payroll-root .bracket-ladder { display: flex; gap: 3px; margin-bottom: 8px; }
  #payroll-root .bracket { flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; border-radius: 4px; background: var(--border-subtle); color: var(--ink-soft); border: 1px solid #E5E3D8; }
  #payroll-root .bracket.active { background: var(--rust); color: white; font-weight: 700; }
  #payroll-root .progress-track { height: 8px; background: var(--bg-chip-off); border-radius: 4px; overflow: hidden; margin: 8px 0; }
  #payroll-root .progress-fill { height: 100%; background: var(--rust); }
  #payroll-root .assumption-note { font-size: 12.5px; color: var(--ink-soft); background: var(--bg-subtle); border-radius: 6px; padding: 8px 10px; margin-top: 8px; line-height: 1.4; }
  #payroll-root .plan-input { font-family: 'IBM Plex Mono', monospace; font-size: 14px; border: 1px solid var(--border-input); border-radius: 5px; padding: 4px 8px; width: 140px; }

  #payroll-root .adj-panel { background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; padding: 14px 16px; margin-top: 18px; }
  #payroll-root .adj-panel h4 { margin: 0 0 10px; font-size: 14px; font-family: 'Roboto', sans-serif; }
  #payroll-root .adj-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  #payroll-root .adj-form select, .adj-form input { font-size: 13.5px; padding: 5px 8px; border: 1px solid var(--border-input); border-radius: 5px; background: var(--bg-input); }
  #payroll-root .adj-form input[type=number] { width: 110px; font-family: 'IBM Plex Mono', monospace; }
  #payroll-root .adj-form input[type=text] { width: 160px; }
  #payroll-root .adj-form button, #payroll-root .btn {
    font-size: 13.5px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--rust);
    background: var(--rust); color: white; cursor: pointer; font-weight: 600;
  }
  #payroll-root .btn.secondary { background: transparent; color: var(--rust); }
  #payroll-root .btn.ghost { background: transparent; color: var(--ink-soft); border-color: var(--border-input); }
  #payroll-root .adj-list { display: flex; flex-direction: column; gap: 6px; }
  #payroll-root .adj-item { display: flex; align-items: center; gap: 10px; font-size: 13.5px; padding: 6px 10px; background: var(--bg-highlight); border-radius: 6px; }
  #payroll-root .adj-item .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  #payroll-root .adj-item .badge.advance { background: #E1EBE3; color: var(--green); }
  #payroll-root .adj-item .badge.deduction { background: var(--red-soft); color: var(--red); }
  #payroll-root .adj-item .note { color: var(--ink-soft); flex: 1; }
  #payroll-root .adj-item .amt { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  #payroll-root .adj-item .del { cursor: pointer; color: var(--text-faint); font-weight: 700; padding: 0 4px; }
  #payroll-root .adj-item .del:hover { color: var(--red); }

  /* Settings tab */
  #payroll-root .settings-dept { background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  #payroll-root .settings-dept-head { padding: 9px 14px; font-size: 13.5px; font-weight: 700; color: white; }
  #payroll-root .settings-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border-row); flex-wrap: wrap; }
  #payroll-root .settings-row.inactive { opacity: 0.5; }
  #payroll-root .settings-row input[type=text] { font-size: 14px; padding: 5px 8px; border: 1px solid var(--border-input); border-radius: 5px; min-width: 160px; }
  #payroll-root .settings-row select { font-size: 13.5px; padding: 5px 6px; border: 1px solid var(--border-input); border-radius: 5px; }
  #payroll-root .settings-row .field-group { display: flex; align-items: center; gap: 4px; font-size: 12.5px; color: var(--ink-soft); }
  #payroll-root .settings-row .field-group input[type=number] { width: 78px; font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; padding: 4px 6px; border: 1px solid var(--border-input); border-radius: 5px; }
  #payroll-root .add-emp-card { background: var(--card); border: 2px dashed var(--border-input); border-radius: 8px; padding: 14px 16px; margin-bottom: 16px; }
  #payroll-root .add-emp-card h4 { margin: 0 0 10px; font-size: 14px; font-family: 'Roboto', sans-serif; }
  #payroll-root .add-emp-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  #payroll-root .add-emp-form input, .add-emp-form select { font-size: 13.5px; padding: 6px 8px; border: 1px solid var(--border-input); border-radius: 5px; }

  #payroll-root .footer-note { font-size: 12px; color: var(--ink-soft); text-align: center; margin-top: 26px; }

  /* Closing shift report */
  #payroll-root .closing-card { background: var(--card); border: 1px solid var(--border-card); border-radius: 8px; padding: 14px 16px; margin-bottom: 18px; }
  #payroll-root .closing-card h4 { margin: 0 0 10px; font-size: 14px; font-family: 'Roboto', sans-serif; }
  #payroll-root .cash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 12px; }
  #payroll-root .cash-field label { display: block; font-size: 11.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 3px; }
  #payroll-root .cash-field input[type=number] { width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; border: 1px solid var(--border-input); border-radius: 6px; padding: 6px 8px; background: var(--bg-input); }
  #payroll-root .cash-field .readonly { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 700; padding: 6px 0; color: var(--rust); }
  #payroll-root .mini-list { display: flex; flex-direction: column; gap: 5px; margin: 8px 0; }
  #payroll-root .mini-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 9px; background: var(--bg-highlight); border-radius: 5px; }
  #payroll-root .mini-item .note { flex: 1; color: var(--ink-soft); }
  #payroll-root .mini-item .amt { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  #payroll-root .mini-item .del { cursor: pointer; color: var(--text-faint); font-weight: 700; padding: 0 3px; }
  #payroll-root .mini-item .del:hover { color: var(--red); }
  #payroll-root .mini-add-form { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0 4px; }
  #payroll-root .mini-add-form input { font-size: 13px; padding: 5px 7px; border: 1px solid var(--border-input); border-radius: 5px; }
  #payroll-root .mini-add-form input[type=text] { flex: 1; min-width: 120px; }
  #payroll-root .mini-add-form input[type=number] { width: 100px; font-family: 'IBM Plex Mono', monospace; }
  #payroll-root .staff-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  #payroll-root .staff-chip { font-size: 11.5px; padding: 3px 9px; border-radius: 12px; background: var(--border-subtle); color: var(--ink-soft); }
  #payroll-root .adj-item .badge.bonus { background: #E5E1F0; color: #5B4B8A; }
  #payroll-root .receipt .line.section-head { font-weight: 700; text-transform: uppercase; font-size: 11.5px; letter-spacing: 0.5px; color: var(--ink-soft); border-top: 1px dashed #DAD8D0; margin-top: 8px; padding-top: 8px; }

  /* P&L tab */
  #payroll-root table.pnl-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; overflow: hidden; font-size: 14px; border: 1px solid var(--border-card); }
  #payroll-root table.pnl-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--ink-soft); padding: 8px; background: var(--bg-subtle); border-bottom: 1px solid var(--border-card); }
  #payroll-root table.pnl-table td { padding: 7px 8px; border-bottom: 1px solid var(--border-subtle); }
  #payroll-root table.pnl-table td.num { text-align: right; font-family: 'IBM Plex Mono', monospace; }
  #payroll-root table.pnl-table tr.auto-row td { background: var(--bg-highlight); font-weight: 600; }
  #payroll-root table.pnl-table tr.profit-row td { background: var(--green-soft); color: var(--green); font-weight: 700; font-size: 15px; }
  #payroll-root table.pnl-table input[type=text] { font-size: 14px; border: 1px solid var(--border-input); border-radius: 5px; padding: 4px 7px; width: 100%; }
  #payroll-root table.pnl-table input[type=number] { font-size: 14px; font-family: 'IBM Plex Mono', monospace; border: 1px solid var(--border-input); border-radius: 5px; padding: 4px 7px; width: 120px; text-align: right; }
  #payroll-root table.pnl-table .pct { color: var(--ink-soft); font-size: 12px; }
  #payroll-root .pnl-add-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  #payroll-root .pnl-add-form input[type=text] { flex: 1; min-width: 160px; font-size: 13.5px; padding: 6px 8px; border: 1px solid var(--border-input); border-radius: 5px; }
  #payroll-root .pnl-add-form input[type=number] { width: 130px; font-size: 13.5px; font-family: 'IBM Plex Mono', monospace; padding: 6px 8px; border: 1px solid var(--border-input); border-radius: 5px; }

  /* ---- Шапка: логотип и название ---- */
  #payroll-root .brand { display: flex; align-items: center; gap: 14px; }
  #payroll-root .brand-logo { height: 46px; width: auto; border-radius: 6px; display: block; }

  /* ---- Кнопка переключения темы ---- */
  #payroll-root .theme-toggle {
    background: none; border: 1px solid var(--border-input); border-radius: 6px;
    width: 30px; height: 30px; cursor: pointer; font-size: 15px; color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }

  /* =========================================================
     ТЁМНАЯ ТЕМА
     Переопределяем переменные — весь остальной CSS их уже использует,
     так что менять больше ничего не нужно.
  ========================================================= */
  #payroll-root.theme-dark {
    color-scheme: dark;
    --ink: #EDEBE4;
    --ink-soft: #A9A69A;
    --paper: #141311;
    --card: #201E1B;
    --line: #38352F;
    --rust: #D69466;
    --rust-soft: #3A2A1E;
    --green: #7FBC8E;
    --green-soft: #1E2E22;
    --red: #E08079;
    --red-soft: #3A201E;
    --c-bar: #7A8B93;
    --c-waiters: #B08C52;
    --c-hookah: #9179A0;
    --c-hostess: #7FA491;
    --c-wash: #6FA1B4;
    --c-kitchen: #A16E4C;
    --c-mgmt: #7A7A7A;

    --border-card: #3A362F;
    --border-input: #46423A;
    --bg-highlight: #262420;
    --bg-input: #1C1A17;
    --bg-subtle: #221F1C;
    --border-subtle: #2C2924;
    --bg-chip-off: #2A2723;
    --border-row: #2C2924;
    --border-dashed: #4A463D;
    --text-faint: #6E6A60;
  }
  #payroll-root.theme-dark .revenue-box.hookah { background: var(--rust-soft); }
  #payroll-root.theme-dark .month-select,
  #payroll-root.theme-dark table.month-table th { background: var(--bg-subtle); }
  #payroll-root.theme-dark img.brand-logo { filter: none; }
  #payroll-root.theme-dark .adj-item .badge.bonus { background: #2E2740; color: #B7A6E8; }

  /* =========================================================
     МОБИЛЬНАЯ АДАПТАЦИЯ
  ========================================================= */
  @media (max-width: 720px) {
    html { overflow-x: hidden; }
    body { overflow-x: hidden; }
    #payroll-root {
      max-width: 100%;
      padding: 10px 10px 22px;
      border-radius: 0;
      min-height: 100vh;
    }

    /* Шапка — логотип и виджет синхронизации переносятся, не сжимаются в кашу */
    #payroll-root .topbar { gap: 10px; }
    #payroll-root .brand { gap: 10px; }
    #payroll-root .brand-logo { height: 34px; }
    #payroll-root .sub { font-size: 11.5px; }
    #payroll-root .sync-widget { font-size: 12px; padding: 5px 10px 5px 8px; }

    /* Панели настроек (шестерёнка / замок) — не должны вылезать за край экрана */
    #payroll-root .sync-config-panel {
      position: fixed; left: 10px; right: 10px; top: auto; width: auto;
      max-width: none; margin-top: 6px;
    }

    /* Вкладки — горизontальная прокрутка вместо переноса/сжатия в нечитаемое */
    #payroll-root .tabs {
      flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; padding-bottom: 2px;
    }
    #payroll-root .tabs::-webkit-scrollbar { display: none; }
    #payroll-root .tab { padding: 9px 12px; font-size: 13.5px; white-space: nowrap; flex-shrink: 0; }

    /* Таблицы — горизонтальная прокрутка внутри каждой вкладки, если не влезает */
    #view-month, #view-timesheet, #view-revenue, #view-pnl, #view-outsource {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    #payroll-root table.month-table:not(.schedule-table) { font-size: 12.5px; }

    /* Дата и переключатель дня — крупнее тап-зоны */
    #payroll-root .datebar { padding: 8px 10px; flex-wrap: wrap; }
    #payroll-root .datebar button.nav { width: 36px; height: 36px; font-size: 17px; }
    #payroll-root .datebar input[type=date] { font-size: 14px; }

    /* Выручка — блоки в один столбец */
    #payroll-root .revenue-inputs { gap: 8px; }
    #payroll-root .revenue-box { min-width: 100%; padding: 10px 12px; }
    #payroll-root .revenue-box input { font-size: 18px; }

    /* Строки сотрудников — сумма не должна прилипать к правому краю без отступа */
    #payroll-root .emp-row { padding: 10px; gap: 8px; }
    #payroll-root .emp-row .name { min-width: 100%; }
    #payroll-root .pay-amount { min-width: 0; }
    #payroll-root .chip { padding: 7px 12px; font-size: 12.5px; }

    /* Кнопки и поля — увеличенные тап-зоны для пальца */
    #payroll-root .btn, #payroll-root .adj-form button { padding: 9px 14px; font-size: 13.5px; }
    #payroll-root .adj-form select, #payroll-root .adj-form input { font-size: 14px; padding: 7px 9px; }
    #payroll-root .adj-form input[type=text], #payroll-root .adj-form input[type=number] { width: 100%; }
    #payroll-root .adj-form { flex-direction: column; align-items: stretch; }

    /* Доска задач — уже адаптивная сетка (auto-fit), просто сузим минимальную ширину колонки */
    #payroll-root .task-board { grid-template-columns: 1fr; }

    /* Чат — сообщения и поле ввода на всю ширину */
    #payroll-root .chat-log { max-height: 260px; }

    /* Расписание/график: если совсем не влезает на очень узких экранах — даём скролл */
    @media (max-width: 420px) {
      #view-schedule { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      #payroll-root table.schedule-table { min-width: 560px; }
    }

    /* Настройки сотрудников — карточки в один столбец */
    #payroll-root .field-group { flex-direction: column; align-items: stretch; }

    #payroll-root .kpi-panel, #payroll-root .adj-panel { padding: 12px; }
    #payroll-root h1, #payroll-root .display { font-size: 19px; }

    /* Известный баг мобильных браузеров (iOS Safari/Chrome): position:fixed фон
       вместе с непрерывной CSS-анимацией background-position периодически
       "теряет" перерисовку части экрана — блоки пропадают и появляются только
       после тача/скролла/перезагрузки. На мобильных отключаем и fixed, и саму
       анимацию — водяной знак остаётся, просто статичный, без движения. */
    body::before { animation: none !important; }
    #payroll-root::before { animation: none !important; }
  }
</style>

<script>
(function(){

  // ---------- Подключение к Google Таблице ----------
  // Можно задать значения по умолчанию прямо здесь (тогда они будут одинаковыми
  // для всех, кому вы раздадите этот файл), либо оставить пустыми и ввести
  // ссылку/ключ через шестерёнку ⚙ в интерфейсе — тогда они сохранятся
  // только в браузере конкретного устройства.
  let SHEET_API_URL = '';

  // Запасной вариант хранения на случай, если localStorage недоступен
  // (например, в некоторых встроенных/песочничных браузерах)
  let memoryConfigFallback = {};

  function localGet_(key){
    try { return window.localStorage.getItem(key); }
    catch(e){ return memoryConfigFallback[key] !== undefined ? memoryConfigFallback[key] : null; }
  }
  function localSet_(key, value){
    try { window.localStorage.setItem(key, value); }
    catch(e){ memoryConfigFallback[key] = value; }
  }

  (function loadSavedConnection_(){
    const savedUrl = localGet_('payroll-sheet-url');
    if (savedUrl) SHEET_API_URL = savedUrl;
  })();

  // ---------- Индикатор синхронизации ----------
  let syncState = { status: 'off', lastSync: null, lastError: null };

  function setSyncStatus(status, extra){
    syncState.status = status;
    extra = extra || {};
    if (extra.error !== undefined) syncState.lastError = extra.error;
    if (status === 'synced') syncState.lastSync = new Date();
    renderSyncStatus();
  }

  function renderSyncStatus(){
    const dot = document.getElementById('sync-dot');
    const text = document.getElementById('sync-text');
    const retryBtn = document.getElementById('sync-retry');
    if (!dot || !text || !retryBtn) return;
    dot.className = 'sync-dot ' + syncState.status;
    retryBtn.style.display = syncState.status === 'error' ? '' : 'none';
    const timeStr = syncState.lastSync
      ? syncState.lastSync.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
      : null;
    if (syncState.status === 'off') text.textContent = 'Не подключено — нажмите ⚙';
    else if (syncState.status === 'saving') text.textContent = 'Синхронизация…';
    else if (syncState.status === 'synced') text.textContent = 'Сохранено' + (timeStr ? ' в ' + timeStr : '');
    else if (syncState.status === 'error') text.textContent = 'Ошибка синхронизации' + (syncState.lastError ? ' (' + syncState.lastError + ')' : '');
    if (retryBtn.title === undefined || retryBtn.title === '') retryBtn.title = 'Повторить синхронизацию';
  }

  function sheetApiConfigured_(){
    return !!(SHEET_API_URL && SHEET_API_URL.trim());
  }

  // Обёртка над Apps Script API с тем же интерфейсом, что был у window.storage,
  // чтобы весь остальной код приложения остался без изменений.
  async function storageGet(key){
    if (!sheetApiConfigured_()){
      setSyncStatus('off');
      return null;
    }
    setSyncStatus('saving');
    try {
      const url = SHEET_API_URL + '?key=' + encodeURIComponent(key);
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setSyncStatus('synced');
      if (data.value === null || data.value === undefined || data.value === '') return null;
      return { key: data.key, value: data.value };
    } catch(err){
      setSyncStatus('error', { error: err.message });
      throw err;
    }
  }

  async function storageSet(key, value){
    if (!sheetApiConfigured_()){
      setSyncStatus('off');
      return null;
    }
    setSyncStatus('saving');
    try {
      // Content-Type: text/plain специально, чтобы браузер не слал preflight OPTIONS-запрос,
      // который Apps Script веб-приложения не обрабатывают.
      const res = await fetch(SHEET_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ key: key, value: value })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setSyncStatus('synced');
      return data;
    } catch(err){
      setSyncStatus('error', { error: err.message });
      throw err;
    }

  let EMPLOYEES = JSON.parse(JSON.stringify(DEFAULT_EMPLOYEES));

  const DEPTS = {

    hostess:    {label:'Хостес',         color:'var(--c-hostess)', rule:'фикс за смену'},
    wash:       {label:'Мойка',          color:'var(--c-wash)',    rule:'почасовая по факту времени'},
    kitchen:    {label:'Кухня',          color:'var(--c-kitchen)', rule:'почасовая по факту времени'},
    chef:       {label:'Шеф-повар',      color:'var(--c-kitchen)', rule:'оклад + KPI-бонусы + % прибыли (позже) + почасовая подмена'},
    management: {label:'Управление',     color:'var(--c-mgmt)',    rule:'фикс. оклад, учитывается только присутствие'},
  };
  const DEPT_ORDER = ['bar','waiters','hookah','hostess','wash','kitchen','chef','management'];

  // ---------- Задачи и чат руководителей ----------

  const TASK_DEPTS = [

    {id:'hall',       label:'Зал'},
    {id:'hookah',     label:'КАЛЬЯН'},

    {id:'in_progress', label:'В работе',     color:'#5C7A6B'},
    {id:'done',        label:'Выполнено',    color:'#3F6B4A'},
    {id:'urgent',      label:'Срочно',       color:'#B23A34'},
    {id:'failed',      label:'Не выполнено', color:'#8A6D3B'},
  ];
  function taskStatusMeta(id){ return TASK_STATUSES.find(s=>s.id===id) || TASK_STATUSES[0]; }

  // ---------- Уровень доступа (полный / менеджер) ----------
  // Простое разграничение на уровне интерфейса конкретного устройства — НЕ
  // полноценная защита данных (данные в таблице всё равно доступны тому, у

  // его, откройте payroll_app.html в текстовом редакторе и поменяйте строку
  // ниже.
  const ACCESS_PASSWORD = 'mindal2026';
  const RESTRICTED_TABS = ['month', 'pnl', 'settings'];
  function getAccessMode(){
    try { return window.localStorage.getItem('payroll-access-mode') || 'full'; }
    catch(e){ return 'full'; }
  }
  function setAccessModeStorage(mode){
    try { window.localStorage.setItem('payroll-access-mode', mode); } catch(e){}
  }

  // ---------- Аутсорс-точки КАЛЬЯН ----------
  const OUTSOURCE_LOCATIONS = [
    {id:'malysheva', label:'СК Малышева'},
    {id:'lenina',    label:'СК Ленина'},
    {id:'veermall',  label:'СК Веермолл'},
  ];
  const OUTSOURCE_HOOKAH_PRICE = 1600;   // цена одного кальяна
  const OUTSOURCE_NET_SHARE = 0.6;       // наша чистая прибыль — 60% от выручки точки
  const OUTSOURCE_SHIFT_RATE = 1000;     // фикс сотруднику за выход
  const OUTSOURCE_SALE_RATE = 250;       // + за каждую продажу кальяна
  function outsourceEmployees(){ return EMPLOYEES.filter(e=>e.role==='outsource_hookah'); }
  let outsourceCollapsed = {};
  // Сумма к выплате конкретному сотруднику за конкретный день по всем точкам, где он был назначен в этот день
  function outsourceDailyPayForEmployee(empId, dateStr){
    const dayData = state.outsourceDays[dateStr];
    if (!dayData) return 0;
    let sum = 0;
    OUTSOURCE_LOCATIONS.forEach(loc=>{
      const entry = dayData[loc.id];
      if (entry && entry.employeeId === empId){
        sum += OUTSOURCE_SHIFT_RATE + (Number(entry.sales)||0)*OUTSOURCE_SALE_RATE;
      }
    });
    return sum;
  }
  function getOutsourceDay(dateStr){
    if (!state.outsourceDays[dateStr]) state.outsourceDays[dateStr] = {};
    const d = state.outsourceDays[dateStr];
    OUTSOURCE_LOCATIONS.forEach(loc=>{ if (!d[loc.id]) d[loc.id] = { employeeId:'', sales:0 }; });
    return d;
  }
  const BREAKAGE_DEPTS = ['bar','waiters','kitchen','wash','hookah'];
  const DEFAULT_BREAKAGE_AMOUNT = 1000;
  const ROLE_LABELS = {
    oclad_percent: 'Оклад + % от выручки',
    kpi_hookah:    'KPI по выручке КАЛЬЯН',
    fixed_shift:   'Фикс за смену',
    hourly:        'Почасовая',
    chef:          'Шеф-повар (оклад + бонусы)',
    oclad_shift:   'Фикс. оклад (присутствие)',
    outsource_hookah: 'Аутсорс КАЛЬЯН (выход + продажи)',
  };

  // Kalyan KPI brackets are stored as an ascending chain of "threshold" points.
  // Each bracket's effective range is [threshold, nextBracket.threshold) — the upper
  // bound is simply the NEXT bracket's threshold, never stored separately. This is what
  // makes editing self-consistent: change one threshold and every later boundary is
  // derived from it automatically, nothing to keep in sync by hand.
  const DEFAULT_KALYAN_BRACKETS = [
    {threshold:0,       type:'fixed',   value:45000},
    {threshold:2050000, type:'fixed',   value:75000},
    {threshold:2250000, type:'fixed',   value:85000},
    {threshold:2350000, type:'fixed',   value:90000},
    {threshold:2550000, type:'percent', value:0.12},
    {threshold:2750000, type:'percent', value:0.13},
    {threshold:3000000, type:'percent', value:0.13},
  ];
  let KALYAN_BRACKETS = JSON.parse(JSON.stringify(DEFAULT_KALYAN_BRACKETS));

  function findBracketIndex(revenue){
    let idx = 0;
    for (let i=0;i<KALYAN_BRACKETS.length;i++){ if (revenue >= KALYAN_BRACKETS[i].threshold) idx=i; else break; }
    return idx;
  }
  function bracketLabel(i){
    const cur = KALYAN_BRACKETS[i], next = KALYAN_BRACKETS[i+1];
    if (i===0 && next) return 'до '+money(next.threshold);
    if (!next) return 'от '+money(cur.threshold);
    return money(cur.threshold)+' – '+money(next.threshold);
  }
  // Editing a threshold shifts every later threshold by the same delta, so the width
  // of the later tiers is preserved instead of being left overlapping or with gaps.
  function updateBracketThreshold(index, rawValue){
    if (index===0) return; // the first tier always starts at 0
    const minAllowed = KALYAN_BRACKETS[index-1].threshold + 1;
    const newValue = Math.max(Math.round(Number(rawValue)||0), minAllowed);
    const delta = newValue - KALYAN_BRACKETS[index].threshold;
    for (let j=index;j<KALYAN_BRACKETS.length;j++){ KALYAN_BRACKETS[j].threshold += delta; }
  }
  function addKalyanBracket(){
    const last = KALYAN_BRACKETS[KALYAN_BRACKETS.length-1];
    KALYAN_BRACKETS.push({threshold:last.threshold+200000, type:last.type, value:last.value});
  }
  function removeKalyanBracket(){
    if (KALYAN_BRACKETS.length>1) KALYAN_BRACKETS.pop();
  }

  // ---------- Расписание (график смен на неделю) ----------
  // Слоты — это позиции/локации, которые нужно закрыть; ячейка на пересечении со

  const DEFAULT_SCHEDULE_SLOTS = [
    {id:'wait1',            label:'Официант',            time:'11:00'},
    {id:'wait2',            label:'Официант',            time:'13:50'},

  let SCHEDULE_SLOTS = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE_SLOTS));

  const DEFAULT_REVENUE_PLAN = 5500000;

  // ---------- State ----------
  const today = new Date();
  function fmtDate(d){
    const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');

  function monthKeyOf(dateStr){ return dateStr.slice(0,7); }
  function daysInMonth(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m,0).getDate(); }

  let state = { currentDate: fmtDate(today), days: {}, plan: {}, adjustments: {}, breakageAmount: {}, chefProfitBonus: {}, pnl: {}, scheduleWeeks: {}, tasksWeeks: {}, chatMessages: null, outsourceDays: {} };
  // state.plan: { 'YYYY-MM': number }
  // state.adjustments: { 'YYYY-MM': { empId: [ {id,type,amount,note,tag?} ] } }
  // state.breakageAmount: { 'YYYY-MM': number } — last amount used for the recurring monthly deduction

  function applyMonthlyBreakage(mk, amount){
    const adj = getAdjustments(mk);

    state.breakageAmount[mk] = amount;

  function applyBulkAdvance(mk, amount, deptFilter){
    const adj = getAdjustments(mk);
    Object.keys(adj).forEach(empId=>{
      adj[empId] = adj[empId].filter(item=>item.tag!=='bulk_advance');
    });
    const targets = EMPLOYEES.filter(e=>e.active && (deptFilter==='all' || e.dept===deptFilter));
    targets.forEach(e=>{
      if (!adj[e.id]) adj[e.id]=[];
      adj[e.id].push({id:uid(), type:'advance', amount, note:'Аванс (массово)', tag:'bulk_advance'});
    });
  }

  // ---------- Storage ----------
  let _lastLoadedConfigExtra = {};
  async function loadConfig(){
    if (configLoaded) return;
    configLoaded = true;
    let needsResave = false;
    try {
      const res = await storageGet('payroll-config');
      if (res && res.value){
        const parsed = JSON.parse(res.value);

        if (parsed.employees && parsed.employees.length){
          // knownEmployeeIds — все id сотрудников по умолчанию, которые пользователю
          // УЖЕ когда-либо предлагались (неважно, оставил он их или удалил).
          // Добавляем автоматически только тех, кого пользователь ещё вообще не видел —
          // то есть новых сотрудников, появившихся в коде уже ПОСЛЕ его последней
          // синхронизации. Если сотрудник когда-то был предложен и удалён — он
          // остаётся удалённым навсегда и не будет "воскресать" при следующем запуске.
          const knownIds = new Set(parsed.knownEmployeeIds || parsed.employees.map(e=>e.id));
          const newDefaults = DEFAULT_EMPLOYEES.filter(e=>!knownIds.has(e.id));
          EMPLOYEES = parsed.employees.concat(newDefaults);
          const updatedKnownIds = Array.from(new Set([...knownIds, ...DEFAULT_EMPLOYEES.map(e=>e.id)]));
          if (newDefaults.length || !parsed.knownEmployeeIds) needsResave = true;
          parsed.knownEmployeeIds = updatedKnownIds;
        }

        if (parsed.kalyanBrackets && parsed.kalyanBrackets.length) KALYAN_BRACKETS = parsed.kalyanBrackets;

        if (parsed.scheduleSlots && parsed.scheduleSlots.length){
          // Та же логика, что и для сотрудников выше — см. комментарий там.
          // Важное отличие: если knownScheduleSlotIds ещё ни разу не сохранялись
          // (первая загрузка после этого исправления), считаем ВСЕ текущие
          // дефолтные слоты уже "известными" — иначе те, что пользователь
          // осознанно удалил (как в этом случае), считались бы новыми и
          // воскресали бы заново при каждом запуске.
          const knownIds = new Set(parsed.knownScheduleSlotIds || DEFAULT_SCHEDULE_SLOTS.map(s=>s.id));
          const newDefaults = DEFAULT_SCHEDULE_SLOTS.filter(s=>!knownIds.has(s.id));
          let merged = parsed.scheduleSlots.concat(newDefaults);

          // Отдельно схлопываем дубли, которые уже успели накопиться в самой
          // сохранённой таблице от прошлых запусков (одна и та же позиция под
          // разными id) — разовая чистка данных, испорченных прежней версией.
          const seenLabelTimeKeys = new Set();
          const deduped = [];
          merged.forEach(s=>{
            const key = (s.label||'')+'|'+(s.time||'');
            if (seenLabelTimeKeys.has(key)) return;
            seenLabelTimeKeys.add(key);
            deduped.push(s);
          });

          const updatedKnownIds = Array.from(new Set([...knownIds, ...DEFAULT_SCHEDULE_SLOTS.map(s=>s.id)]));
          if (newDefaults.length || deduped.length !== parsed.scheduleSlots.length || !parsed.knownScheduleSlotIds) needsResave = true;
          SCHEDULE_SLOTS = deduped;
          parsed.knownScheduleSlotIds = updatedKnownIds;
        }

        if (typeof parsed.telegramBotToken === 'string') TELEGRAM_BOT_TOKEN = parsed.telegramBotToken;
        if (typeof parsed.telegramChatId === 'string') TELEGRAM_CHAT_ID = parsed.telegramChatId;

        _lastLoadedConfigExtra = { knownEmployeeIds: parsed.knownEmployeeIds, knownScheduleSlotIds: parsed.knownScheduleSlotIds };
      }
    } catch(e){ /* use defaults */ }
    if (needsResave) scheduleSaveConfig();
  }

  // Загружает выбранный файл на Google Диск через Apps Script и возвращает
  // {name, mimeType, size, url, viewUrl} — url годится для скачивания, viewUrl для просмотра в браузере.
  function fileToBase64_(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=> resolve(reader.result.split(',')[1] || '');
      reader.onerror = ()=> reject(reader.error);
      reader.readAsDataURL(file);
    });
  }
  async function uploadFileToSheet(file){
    if (!sheetApiConfigured_()) throw new Error('Синхронизация с таблицей не настроена');
    const dataBase64 = await fileToBase64_(file);
    const res = await fetch(SHEET_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'uploadFile', filename:file.name, mimeType:file.type||'application/octet-stream', dataBase64 })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.message || data.error);
    return data;
  }

  // Отправляет текст в Telegram-чат через Bot API. Специально используем GET
  // с параметрами в строке запроса (а не POST + JSON) — это делает запрос
  // "простым" для CORS и не требует предварительного preflight-запроса,
  // который у части браузеров может не проходить с Telegram API. Ответ от
  // Telegram мы не читаем (браузер иногда блокирует чтение междоменного
  // ответа) — само сообщение при этом всё равно доходит до чата.
  function telegramConfigured_(){
    return !!(TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID);
  }
  async function sendTextToTelegram(text){
    if (!telegramConfigured_()) throw new Error('Telegram не настроен — укажите токен бота и chat_id в разделе «Сотрудники»');
    const url = 'https://api.telegram.org/bot' + encodeURIComponent(TELEGRAM_BOT_TOKEN) + '/sendMessage'
      + '?chat_id=' + encodeURIComponent(TELEGRAM_CHAT_ID)
      + '&parse_mode=HTML'
      + '&text=' + encodeURIComponent(text);
    try {
      await fetch(url, { method: 'GET' });
    } catch(e){
      // Из-за CORS браузер иногда не даёт прочитать ответ Telegram, хотя
      // сообщение при этом реально отправляется — поэтому не считаем это
      // фатальной ошибкой сразу, просто логируем.
      console.warn('Telegram fetch warning (сообщение могло всё же отправиться):', e);
    }
  }

  // ---------- Calculations ----------
  function parseTimeToMinutes(t){ if (!t) return null; const [h,m]=t.split(':').map(Number); return h*60+m; }
  function hoursBetween(timeIn,timeOut){
    const a=parseTimeToMinutes(timeIn), b=parseTimeToMinutes(timeOut);
    if (a===null||b===null) return 0;
    let diff=b-a; if (diff<=0) diff+=24*60;
    return Math.round((diff/60)*100)/100;
  }
  function dailyPay(emp, day, curKmBracket, dateStr){
    const s = day.shifts[emp.id];
    if (!s) return null;
    if (emp.role === 'oclad_percent') return s.worked ? Math.round(day.totalRevenue*emp.percent*100)/100 : 0;
    if (emp.role === 'fixed_shift')   return s.worked ? emp.amount : 0;
    if (emp.role === 'hourly')        return s.worked ? Math.round(hoursBetween(s.timeIn,s.timeOut)*emp.rate*100)/100 : 0;
    if (emp.role === 'chef')          { const ch = hoursBetween(s.coverStart, s.coverEnd); return (s.coverWorked && ch>0) ? Math.round(ch*emp.coverRate*100)/100 : 0; }
    if (emp.role === 'outsource_hookah') return dateStr ? outsourceDailyPayForEmployee(emp.id, dateStr) : 0;
    if (emp.role === 'kpi_hookah'){
      // Fixed KPI tiers (45,000 / 75,000 / 85,000 / 90,000) are a monthly oclad — no daily figure.
      // Once the monthly hookah revenue reaches a percent tier (12%/13%), the oclad is cancelled
      // and each master earns that percent of THAT DAY's hookah revenue on days they worked.
      if (curKmBracket && curKmBracket.type === 'percent'){
        return s.worked ? Math.round((Number(day.hookahRevenue)||0) * curKmBracket.value * 100)/100 : 0;
      }
      return null;
    }
    return null; // oclad_shift => monthly only
  }
  function monthlyHookahRevenue(mk){
    let sum = 0;
    monthDatesFor(mk).forEach(dt=>{ sum += Number(state.days[dt].hookahRevenue)||0; });
    return sum;
  }
  function monthDatesFor(mk){ return Object.keys(state.days).filter(dt=>monthKeyOf(dt)===mk).sort(); }

  function computeAdjustmentTotals(mk){
    const adj = getAdjustments(mk);
    const result = {};
    EMPLOYEES.forEach(e=>{
      const list = adj[e.id] || [];
      let advance=0, deduction=0, bonus=0;
      list.forEach(item=>{
        if (item.type==='advance') advance += Number(item.amount)||0;
        else if (item.type==='bonus') bonus += Number(item.amount)||0;
        else deduction += Number(item.amount)||0;
      });
      result[e.id] = {advance, deduction, bonus};
    });
    return result;
  }

  function computeMonthTotals(mk){
    const dates = monthDatesFor(mk);
    const totals = {};
    EMPLOYEES.forEach(e=> totals[e.id] = {oclad:0, variable:0, bonuses:0, shiftsWorked:0});

    let hookahRevenueSum = 0, totalRevenueSum = 0, substituteCashTotal = 0;
    dates.forEach(dt=>{
      const day = state.days[dt];
      hookahRevenueSum += Number(day.hookahRevenue)||0;
      totalRevenueSum  += Number(day.totalRevenue)||0;
      (day.substitutes||[]).forEach(sub=>{ substituteCashTotal += Number(sub.amount)||0; });
      EMPLOYEES.forEach(e=>{
        const s = day.shifts[e.id]; if (!s) return;
        if (e.role === 'oclad_percent'){ if (s.worked){ totals[e.id].variable += day.totalRevenue*e.percent; totals[e.id].shiftsWorked++; } }
        else if (e.role === 'fixed_shift'){ if (s.worked){ totals[e.id].variable += e.amount; totals[e.id].shiftsWorked++; } }
        else if (e.role === 'hourly'){ if (s.worked){ totals[e.id].variable += hoursBetween(s.timeIn,s.timeOut)*e.rate; totals[e.id].shiftsWorked++; } }
        else if (e.role === 'chef'){ const ch = hoursBetween(s.coverStart, s.coverEnd); if (s.coverWorked && ch>0) totals[e.id].variable += ch*e.coverRate; }
        else if (e.role === 'kpi_hookah'){ if (s.worked) totals[e.id].shiftsWorked++; }
        else if (e.role === 'oclad_shift'){ if (s.worked) totals[e.id].shiftsWorked++; }
      });
    });

    // Аутсорс-точки КАЛЬЯН хранятся отдельно от state.days (за них не обязательно
    // заходить на вкладку «Сегодня»), поэтому считаем их по всем дням месяца отдельно.
    Object.keys(state.outsourceDays).filter(dt=>monthKeyOf(dt)===mk).forEach(dt=>{
      outsourceEmployees().forEach(e=>{
        const p = outsourceDailyPayForEmployee(e.id, dt);
        if (p>0){ totals[e.id].variable += p; totals[e.id].shiftsWorked++; }
      });
    });

    const chef = EMPLOYEES.find(e=>e.id==='chef');
    if (chef){
      let flags = {reviews:false, stock:false, menu:false};
      dates.forEach(dt=>{ const s=state.days[dt].shifts.chef; if(!s) return;
        if (s.bonusReviews) flags.reviews=true; if (s.bonusStock) flags.stock=true; if (s.bonusMenu) flags.menu=true; });
      let bonusTotal=0;
      if (flags.reviews) bonusTotal += chef.bonuses.reviews;
      if (flags.stock)   bonusTotal += chef.bonuses.stock;
      if (flags.menu)    bonusTotal += chef.bonuses.menu;
      const profitBonus = getChefProfitBonus(mk);
      if (profitBonus.confirmed) bonusTotal += (Number(profitBonus.amount)||0);
      totals.chef.bonuses = bonusTotal;
      totals.chef.chefFlags = flags;
    }

    EMPLOYEES.forEach(e=>{
      if (e.role==='oclad_percent') totals[e.id].oclad = e.oclad;
      if (e.role==='chef')          totals[e.id].oclad = e.oclad;
      if (e.role==='oclad_shift')   totals[e.id].oclad = e.amount;
    });

    const kalyanEmps = EMPLOYEES.filter(e=>e.role==='kpi_hookah');
    const curKmBracket = KALYAN_BRACKETS[findBracketIndex(hookahRevenueSum)];
    if (curKmBracket.type === 'fixed'){
      // Fixed tier: the bracket value IS each master's oclad for the month — nothing extra accrues.
      kalyanEmps.forEach(e=>{
        totals[e.id].oclad = curKmBracket.value;
        totals[e.id].variable = 0;
        totals[e.id].kmLevelPct = null;
      });
    } else {
      // Percent tier: oclad is cancelled. Each master earns curKmBracket.value % of THAT DAY's
      // hookah revenue, for every day they worked (accumulated across the month).
      kalyanEmps.forEach(e=>{ totals[e.id].oclad = 0; totals[e.id].kmLevelPct = curKmBracket.value; });
      dates.forEach(dt=>{
        const day = state.days[dt];
        kalyanEmps.forEach(e=>{
          const s = day.shifts[e.id];
          if (s && s.worked) totals[e.id].variable += (Number(day.hookahRevenue)||0) * curKmBracket.value;
        });
      });
    }

    const adjTotals = computeAdjustmentTotals(mk);
    // Manual bonus adjustments (премии) add on top of any role-specific bonuses computed above.
    EMPLOYEES.forEach(e=>{
      const b = (adjTotals[e.id] && adjTotals[e.id].bonus) || 0;
      if (b) totals[e.id].bonuses = (totals[e.id].bonuses||0) + b;
    });

    return {totals, hookahRevenueSum, totalRevenueSum, curKmBracket, dates, adjTotals, substituteCashTotal};
  }

  // ---------- Render helpers ----------
  function money(n){ if (n===null||n===undefined) return '—'; return Math.round(n).toLocaleString('ru-RU')+' ₽'; }
  function weekdayShort(dateStr){ const days=['вс','пн','вт','ср','чт','пт','сб']; return days[new Date(dateStr+'T00:00:00').getDay()]; }
  function uid(){ return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

          + '<span class="del" data-act="del-expense" data-id="'+x.id+'">✕</span></div>';

    }
    html += '<div class="mini-add-form">'

      + '<button id="expense-add" class="btn secondary">+ Добавить расход</button>'
      + '</div>';

    html += '<div class="cash-grid" style="margin-top:10px;">'
      + '<div class="cash-field"><label>Наличные с учётом трат</label><div class="readonly">'+money(cashAfterExpenses)+'</div></div>'
      + '<div class="cash-field"><label>Остаток размена в кассе</label><input type="number" id="change-fund" value="'+day.changeFund+'" placeholder="15000"/></div>'
      + '</div>';

    html += '<div style="margin-top:6px;">'
      + '<label style="display:block;font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:3px;">ФИО закрывающего лица</label>'
      + '<select id="closer-name" style="width:100%;font-size:15px;padding:6px 8px;border:1px solid var(--border-input);border-radius:6px;">'
      + '<option value=""'+(!day.closerName?' selected':'')+'>— выбрать —</option>'
      + '<option value="Дмитрий Н"'+(day.closerName==='Дмитрий Н'?' selected':'')+'>Дмитрий Н</option>'
      + '<option value="Иван К"'+(day.closerName==='Иван К'?' selected':'')+'>Иван К</option>'
      + '</select>'
      + '</div>';
    html += '</div>';

    const receiptLines = [];

    DEPT_ORDER.forEach(deptKey=>{
      const dept = DEPTS[deptKey];
      const emps = EMPLOYEES.filter(e=>e.dept===deptKey && e.active);
      if (!emps.length && deptKey!=='wash') return;
      html += '<div class="dept-card"><div class="dept-head" style="background:'+dept.color+'">'
        + '<span>'+dept.label+'</span><span class="rule">'+dept.rule+'</span></div>';

      emps.forEach(e=>{
        const s = day.shifts[e.id];
        const pay = dailyPay(e, day, curKmBracket, state.currentDate);
        html += '<div class="emp-row" data-emp="'+e.id+'"><div class="name">'+e.name+'</div>'
          + '<div class="chip '+(s.worked?'on':'off')+'" data-act="toggle-shift" data-emp="'+e.id+'">'+(s.worked?'Смена':'Выходной')+'</div>';

        if (e.role === 'hourly' && s.worked){
          const h = hoursBetween(s.timeIn, s.timeOut);
          html += '<div class="time-inputs">'
            + '<input type="time" data-field="timeIn" data-emp="'+e.id+'" value="'+s.timeIn+'"/> — '
            + '<input type="time" data-field="timeOut" data-emp="'+e.id+'" value="'+s.timeOut+'"/>'
            + '<span class="hours-badge">'+(h>0?h+' ч':'—')+'</span></div>';
        }
        if (e.role === 'chef'){
          const ch = hoursBetween(s.coverStart, s.coverEnd);
          html += '<div class="chef-extra"><label><input type="checkbox" data-act="toggle-cover" data-emp="'+e.id+'" '+(s.coverWorked?'checked':'')+'/> замещал повара</label>'
            + (s.coverWorked ?
                '<div class="time-inputs">'
                + '<input type="time" data-field="coverStart" data-emp="'+e.id+'" value="'+(s.coverStart||'')+'"/> — '
                + '<input type="time" data-field="coverEnd" data-emp="'+e.id+'" value="'+(s.coverEnd||'')+'"/>'
                + '<span class="hours-badge">'+(ch>0?ch+' ч':'—')+'</span></div>'
              : '')
            + '</div>';
        }
        if (e.role === 'kpi_hookah'){
          html += '<div style="font-size:11.5px;color:var(--ink-soft)">'+(curKmBracket.type==='fixed'?'оклад уровня: '+money(curKmBracket.value)+'/мес':(curKmBracket.value*100)+'% от выручки КАЛЬЯН сегодня')+'</div>';
        }
        if (pay === null){
          html += '<div class="pay-note">начисляется по итогам месяца</div>';
          if (e.role === 'kpi_hookah' && s.worked){
            receiptLines.push({label:dept.label+' — '+e.name, note:'смена (оклад по итогам месяца)'});
          }
        } else {
          html += '<div class="pay-amount '+(pay===0?'zero':'')+'">'+(pay===0?'—':money(pay))+'</div>';
          if (e.role === 'oclad_percent' && s.worked){
            // Approximate total value of THIS shift, assuming 14–16 shifts/month for the oclad share.
            const ocladPerShiftLow = e.oclad/16, ocladPerShiftHigh = e.oclad/14;
            const low = ocladPerShiftLow + pay, high = ocladPerShiftHigh + pay;
            const sub = 'оценка при 14–16 сменах/мес (оклад/смену ≈ '+money(ocladPerShiftLow)+'–'+money(ocladPerShiftHigh)+' + 1,3% от сегодняшней выручки); точный расчёт — во вкладке «Месяц»';
            receiptLines.push({label:dept.label+' — '+e.name, low:low, high:high, sub:sub});
          } else if (pay>0){
            receiptLines.push({label:dept.label+' — '+e.name, low:pay, high:pay});
          }
        }
        html += '</div>';
      });

      if (deptKey === 'chef'){
        const chefEmp = EMPLOYEES.find(x=>x.id==='chef');
        const s = day.shifts.chef;
        if (chefEmp && s){
          html += '<div class="bonus-row">'
            + '<label><input type="checkbox" data-act="toggle-bonus" data-field="bonusReviews" data-emp="chef" '+(s.bonusReviews?'checked':'')+'/> отзывы (+'+money(chefEmp.bonuses.reviews)+'/мес)</label>'
            + '<label><input type="checkbox" data-act="toggle-bonus" data-field="bonusStock" data-emp="chef" '+(s.bonusStock?'checked':'')+'/> товарный остаток (+'+money(chefEmp.bonuses.stock)+'/мес)</label>'
            + '<label><input type="checkbox" data-act="toggle-bonus" data-field="bonusMenu" data-emp="chef" '+(s.bonusMenu?'checked':'')+'/> меню/документация (+'+money(chefEmp.bonuses.menu)+'/мес)</label>'
            + '</div><div class="assumption-note">Отметки бонусов — на месяц целиком. 5% от чистой прибыли кухни — на вкладке «Месяц».</div>';
        }
      }

      if (deptKey === 'wash'){
        html += '<div class="bonus-row" style="flex-direction:column;align-items:stretch;">'
          + '<div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:4px;">Подмена (наличными, не входит в ФОТ — переносится в П&amp;Л)</div>';
        if ((day.substitutes||[]).length){
          html += '<div class="mini-list">' + day.substitutes.map(x=>{
            return '<div class="mini-item"><span class="note">'+x.name+'</span><span class="amt">'+money(x.amount)+'</span>'
              + '<span class="del" data-act="del-substitute" data-id="'+x.id+'">✕</span></div>';
          }).join('') + '</div>';
        }
        html += '<div class="mini-add-form">'
          + '<input type="text" id="substitute-name" placeholder="имя подменного сотрудника"/>'
          + '<input type="number" id="substitute-amount" value="3000" placeholder="сумма, ₽"/>'
          + '<button id="substitute-add" class="btn secondary">+ Добавить подмену</button>'
          + '</div></div>';
      }
      html += '</div>';
    });

    const substituteTotal = (day.substitutes||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
    let totalLow = receiptLines.reduce((s,l)=>s+(l.note?0:l.low),0) + substituteTotal;
    let totalHigh = receiptLines.reduce((s,l)=>s+(l.note?0:l.high),0) + substituteTotal;
    function fmtLine(low, high){ return low===high ? money(low) : '≈ '+money(low)+'–'+money(high); }

    html += '<div class="receipt"><h3 class="display">Чек дня · '+state.currentDate+'</h3>'
      + receiptLines.map(l=>{ const dots='.'.repeat(Math.max(3,46-l.label.length));
        const amtHtml = l.note ? '<span style="font-family:inherit;font-size:12px;color:var(--ink-soft);">'+l.note+'</span>' : fmtLine(l.low,l.high);
        let row = '<div class="line"><div class="ln">'+l.label+' <span class="dots">'+dots+'</span></div><div class="amt">'+amtHtml+'</div></div>';
        if (l.sub) row += '<div class="line sub"><div class="ln">'+l.sub+'</div></div>';
        return row; }).join('');

    if ((day.substitutes||[]).length){
      html += '<div class="line section-head">Подмена Мойка (нал., вне ФОТ)</div>'
        + day.substitutes.map(x=>'<div class="line"><div class="ln">'+x.name+' <span class="dots">'+'.'.repeat(Math.max(3,40-x.name.length))+'</span></div><div class="amt">'+money(x.amount)+'</div></div>').join('');
    }

    html += '<div class="total"><span>ИТОГО'+(substituteTotal>0?' (с учётом подмены)':'')+'</span><span>'+fmtLine(totalLow,totalHigh)+'</span></div>';

    html += '<div class="line section-head">Закрытие смены</div>'
      + '<div class="line"><div class="ln">Выручка за день</div><div class="amt">'+money(day.totalRevenue)+'</div></div>'
      + '<div class="line"><div class="ln">Наличные ООО / ИП</div><div class="amt">'+money(day.cashOOO)+' / '+money(day.cashIP)+'</div></div>'
      + '<div class="line"><div class="ln">Итого наличных</div><div class="amt">'+money(totalCash)+'</div></div>'
      + '<div class="line"><div class="ln">Расходы за день</div><div class="amt">-'+money(expensesSum)+'</div></div>'
      + '<div class="line"><div class="ln"><b>Наличные с учётом трат</b></div><div class="amt"><b>'+money(cashAfterExpenses)+'</b></div></div>'
      + '<div class="line"><div class="ln">Остаток размена в кассе</div><div class="amt">'+money(day.changeFund)+'</div></div>'
      + '<div class="line"><div class="ln">Закрывающий</div><div class="amt" style="font-family:inherit;">'+(day.closerName||'—')+'</div></div>'
      + '</div>';

    html += '<div style="display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap;">'
      + '<button class="btn" id="send-telegram-btn">📤 Отправить чек в Telegram</button>'
      + '<span id="telegram-send-status" style="font-size:11.5px;color:var(--ink-soft);"></span>'
      + '</div>';

    // ---- Текстовая версия чека для Telegram (HTML-разметка Telegram: <b>, не markdown) ----
    const escTg = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    let tgLines = ['<b>Чек дня · '+escTg(state.currentDate)+'</b>', ''];
    receiptLines.forEach(l=>{
      const amt = l.note ? l.note : fmtLine(l.low, l.high);
      tgLines.push(escTg(l.label)+': '+escTg(amt) + (l.sub ? ' ('+escTg(l.sub)+')' : ''));
    });
    if ((day.substitutes||[]).length){
      tgLines.push('', '<b>Подмена Мойка (нал., вне ФОТ)</b>');
      day.substitutes.forEach(x=> tgLines.push(escTg(x.name)+': '+escTg(money(x.amount))));
    }
    tgLines.push('', '<b>ИТОГО'+(substituteTotal>0?' (с учётом подмены)':'')+': '+escTg(fmtLine(totalLow,totalHigh))+'</b>');
    tgLines.push('', '<b>Закрытие смены</b>');
    tgLines.push('Выручка за день: '+escTg(money(day.totalRevenue)));
    tgLines.push('Наличные ООО / ИП: '+escTg(money(day.cashOOO))+' / '+escTg(money(day.cashIP)));
    tgLines.push('Итого наличных: '+escTg(money(totalCash)));
    tgLines.push('Расходы за день: -'+escTg(money(expensesSum)));
    tgLines.push('<b>Наличные с учётом трат: '+escTg(money(cashAfterExpenses))+'</b>');
    tgLines.push('Остаток размена в кассе: '+escTg(money(day.changeFund)));
    tgLines.push('Закрывающий: '+escTg(day.closerName||'—'));
    lastReceiptText = tgLines.join('\n');

    document.getElementById('view-day').innerHTML = html;
    attachDayHandlers();
  }

  function attachDayHandlers(){
    const root = document.getElementById('view-day');
    root.querySelector('#send-telegram-btn').addEventListener('click', async ()=>{
      const statusEl = root.querySelector('#telegram-send-status');
      if (!telegramConfigured_()){
        statusEl.textContent = 'Telegram не настроен — заполните токен бота и chat_id в разделе «Сотрудники».';
        statusEl.style.color = 'var(--red)';
        return;
      }
      statusEl.textContent = 'Отправка…';
      statusEl.style.color = 'var(--ink-soft)';
      try {
        await sendTextToTelegram(lastReceiptText);
        statusEl.textContent = 'Отправлено ✓';
        statusEl.style.color = 'var(--green)';
      } catch(err){
        statusEl.textContent = 'Не удалось отправить: ' + err.message;
        statusEl.style.color = 'var(--red)';
      }
    });
    root.querySelector('#rev-total').addEventListener('change', e=>{ getDay(state.currentDate).totalRevenue=Number(e.target.value)||0; scheduleSave(); renderDayView(); });
    root.querySelector('#rev-hookah').addEventListener('change', e=>{ getDay(state.currentDate).hookahRevenue=Number(e.target.value)||0; scheduleSave(); renderDayView(); });
    root.querySelector('#date-input').addEventListener('change', async e=>{ state.currentDate=e.target.value; await loadMonth(monthKeyOf(state.currentDate)); renderDayView(); });

    root.querySelector('#cash-ip').addEventListener('change', e=>{ getDay(state.currentDate).cashIP=Number(e.target.value)||0; scheduleSave(); renderDayView(); });
    root.querySelector('#cash-ooo').addEventListener('change', e=>{ getDay(state.currentDate).cashOOO=Number(e.target.value)||0; scheduleSave(); renderDayView(); });
    root.querySelector('#change-fund').addEventListener('change', e=>{ getDay(state.currentDate).changeFund=Number(e.target.value)||0; scheduleSave(); renderDayView(); });
    root.querySelector('#closer-name').addEventListener('change', e=>{ getDay(state.currentDate).closerName=e.target.value; scheduleSave(); renderDayView(); });

        scheduleSave(); renderDayView();
      });

      el.addEventListener('click', ()=>{
        const d = getDay(state.currentDate);
        d.substitutes = d.substitutes.filter(x=>x.id!==el.dataset.id);
        scheduleSave(); renderDayView();
      });
    });

    root.querySelectorAll('[data-act="toggle-shift"]').forEach(el=>{
      el.addEventListener('click', ()=>{ const s=getDay(state.currentDate).shifts[el.dataset.emp]; s.worked=!s.worked; scheduleSave(); renderDayView(); });
    });
    root.querySelectorAll('[data-field="timeIn"],[data-field="timeOut"]').forEach(el=>{
      el.addEventListener('change', ()=>{ const s=getDay(state.currentDate).shifts[el.dataset.emp]; s[el.dataset.field]=el.value; scheduleSave(); renderDayView(); });
    });
    root.querySelectorAll('[data-act="toggle-cover"]').forEach(el=>{
      el.addEventListener('click', ()=>{ const s=getDay(state.currentDate).shifts[el.dataset.emp]; s.coverWorked=el.checked; scheduleSave(); renderDayView(); });
    });
    root.querySelectorAll('[data-field="coverStart"],[data-field="coverEnd"]').forEach(el=>{

    });
    root.querySelectorAll('[data-act="toggle-bonus"]').forEach(el=>{
      el.addEventListener('click', ()=>{ const s=getDay(state.currentDate).shifts[el.dataset.emp]; s[el.dataset.field]=el.checked; scheduleSave(); renderDayView(); });

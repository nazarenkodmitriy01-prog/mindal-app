    root.querySelector('[data-act="prevday"]').addEventListener('click', async ()=>{
      const d=new Date(state.currentDate+'T00:00:00'); d.setDate(d.getDate()-1); state.currentDate=fmtDate(d);
      await loadMonth(monthKeyOf(state.currentDate)); renderDayView();
    });
    root.querySelector('[data-act="nextday"]').addEventListener('click', async ()=>{
      const d=new Date(state.currentDate+'T00:00:00'); d.setDate(d.getDate()+1); state.currentDate=fmtDate(d);
      await loadMonth(monthKeyOf(state.currentDate)); renderDayView();
    });
  }

  function sumGrandFot(totals){
    let sum=0;
    EMPLOYEES.forEach(e=>{ const t=totals[e.id]; sum += (t.oclad||0)+(t.variable||0)+(t.bonuses||0); });
    return sum;
  }

  // ---------- P&L view ----------
  function renderPnlView(){
    const mk = monthKeyOf(state.currentDate);
    const {totals, totalRevenueSum, substituteCashTotal} = computeMonthTotals(mk);
    const fot = sumGrandFot(totals);
    const categories = getPnl(mk);
    const revenue = totalRevenueSum;

    function pct(amount){ return revenue>0 ? (amount/revenue*100).toFixed(1)+'%' : '—'; }

    let html = '<div style="margin-bottom:14px;"><input class="month-select" type="month" id="pnl-month-input" value="'+mk+'"/></div>';

    let expenseSum = 0;
    categories.forEach(c=>{ expenseSum += Number(c.amount)||0; });
    const netProfit = revenue - fot - substituteCashTotal - expenseSum;

    html += '<table class="pnl-table"><thead><tr><th>Статья</th><th class="num">Сумма</th><th class="num">% от выручки</th><th></th></tr></thead><tbody>';
    html += '<tr class="auto-row"><td>Общая выручка (автоматически)</td><td class="num">'+money(revenue)+'</td><td class="num pct">100%</td><td></td></tr>';
    html += '<tr class="auto-row"><td>Зарплатный фонд, ФОТ (автоматически)</td><td class="num">'+money(fot)+'</td><td class="num pct">'+pct(fot)+'</td><td></td></tr>';
    if (substituteCashTotal>0){
      html += '<tr class="auto-row"><td>Подмены Мойка, нал. (автоматически)</td><td class="num">'+money(substituteCashTotal)+'</td><td class="num pct">'+pct(substituteCashTotal)+'</td><td></td></tr>';
    }
    categories.forEach(c=>{
      html += '<tr data-cat="'+c.id+'">'
        + '<td><input type="text" data-field="name" value="'+c.name+'"/></td>'
        + '<td class="num"><input type="number" data-field="amount" value="'+(c.amount||'')+'" placeholder="0"/></td>'
        + '<td class="num pct">'+pct(Number(c.amount)||0)+'</td>'
        + '<td><span class="del" data-act="del-pnl-cat" data-id="'+c.id+'" style="cursor:pointer;color:var(--text-faint);">✕</span></td></tr>';
    });
    html += '<tr class="profit-row"><td>ЧИСТАЯ ПРИБЫЛЬ</td><td class="num">'+money(netProfit)+'</td><td class="num">'+pct(netProfit)+'</td><td></td></tr>';
    html += '</tbody></table>';

    html += '<div class="pnl-add-form">'
      + '<input type="text" id="pnl-new-name" placeholder="Название статьи расхода"/>'
      + '<input type="number" id="pnl-new-amount" placeholder="сумма, ₽"/>'
      + '<button id="pnl-add" class="btn">Добавить статью</button>'
      + '</div>';
    html += '<div class="assumption-note">Выручка и ФОТ считаются автоматически из вкладок «Сегодня»/«Месяц». Остальные статьи — добавляются, редактируются и удаляются вручную.</div>';

    document.getElementById('view-pnl').innerHTML = html;
    attachPnlHandlers(mk);
  }

  function attachPnlHandlers(mk){
    const root = document.getElementById('view-pnl');
    root.querySelector('#pnl-month-input').addEventListener('change', async ev=>{
      const [y,m] = ev.target.value.split('-'); state.currentDate = y+'-'+m+'-01';
      await loadMonth(monthKeyOf(state.currentDate)); renderPnlView();
    });
    root.querySelectorAll('[data-field="name"]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const cat = getPnl(mk).find(c=>c.id===inp.closest('tr').dataset.cat);
        cat.name = inp.value; scheduleSave(); renderPnlView();
      });
    });
    root.querySelectorAll('[data-field="amount"]').forEach(inp=>{
      inp.addEventListener('change', ()=>{
        const cat = getPnl(mk).find(c=>c.id===inp.closest('tr').dataset.cat);
        cat.amount = Number(inp.value)||0; scheduleSave(); renderPnlView();
      });
    });
    root.querySelectorAll('[data-act="del-pnl-cat"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        state.pnl[mk] = getPnl(mk).filter(c=>c.id!==el.dataset.id);
        scheduleSave(); renderPnlView();
      });
    });
    root.querySelector('#pnl-add').addEventListener('click', ()=>{
      const name = root.querySelector('#pnl-new-name').value.trim();
      const amount = Number(root.querySelector('#pnl-new-amount').value)||0;
      if (!name) return;
      getPnl(mk).push({id:uid(), name, amount});
      scheduleSave(); renderPnlView();
    });
  }
  function renderMonthView(){
    const mk = monthKeyOf(state.currentDate);
    const {totals, hookahRevenueSum, totalRevenueSum, curKmBracket, adjTotals} = computeMonthTotals(mk);
    const bIdx = findBracketIndex(hookahRevenueSum);
    const curBracket = KALYAN_BRACKETS[bIdx];
    const nextBracket = KALYAN_BRACKETS[bIdx+1];
    const kProgress = nextBracket ? Math.min(100,(hookahRevenueSum-curBracket.threshold)/(nextBracket.threshold-curBracket.threshold)*100) : 100;

    const plan = state.plan[mk];
    const dates = monthDatesFor(mk);
    const lastDay = dates.length ? Math.max.apply(null, dates.map(d=>Number(d.slice(8,10)))) : 0;
    const remainToPlan = plan ? Math.max(0, plan-totalRevenueSum) : null;
    const dailyTarget = plan ? plan/daysInMonth(mk) : null;
    const expectedToDate = dailyTarget!==null ? dailyTarget*lastDay : null;
    const shortfallToDate = expectedToDate!==null ? expectedToDate-totalRevenueSum : null;
    const fotForPct = sumGrandFot(totals);
    const fotPct = totalRevenueSum>0 ? (fotForPct/totalRevenueSum*100) : null;

    let html = '<div style="margin-bottom:14px;"><input class="month-select" type="month" id="month-input" value="'+mk+'"/></div>';

    html += '<div class="kpi-panel"><h4>План по общей выручке ресторана</h4>';
    if (plan){
      const rProgress = Math.min(100, totalRevenueSum/plan*100);
      html += '<div class="progress-track"><div class="progress-fill" style="width:'+rProgress+'%"></div></div>'
        + '<div style="font-size:13.5px;color:var(--ink-soft)">Выручка за месяц: <b class="mono">'+money(totalRevenueSum)+'</b>'
        + ' из плана <b class="mono">'+money(plan)+'</b> ('+rProgress.toFixed(0)+'%)'
        + ' · осталось до конца месяца <b class="mono">'+money(remainToPlan)+'</b>'
        + (shortfallToDate!==null
            ? (shortfallToDate > 0
                ? ' · <span style="color:var(--red);">общая недостача на сегодня: <b class="mono">'+money(shortfallToDate)+'</b></span>'
                : ' · <span style="color:var(--green);">опережение графика на сегодня: <b class="mono">'+money(-shortfallToDate)+'</b></span>')
            : '')
        + '</div>';
    } else {
      html += '<div class="assumption-note">План на этот месяц ещё не задан.</div>';
    }
    html += '<div style="margin-top:10px;">План месяца, ₽: <input class="plan-input" type="number" id="plan-input" value="'+(plan||'')+'" placeholder="напр. 5500000"/></div>'
      + '<div style="margin-top:10px;font-size:13.5px;color:var(--ink-soft);">Соотношение ФОТ к выручке: <b class="mono" style="color:var(--rust)">'+(fotPct!==null?fotPct.toFixed(1)+'%':'—')+'</b>'
      + ' (ФОТ '+money(fotForPct)+' от выручки '+money(totalRevenueSum)+')</div></div>';

    const kmModeText = curKmBracket.type==='fixed'
      ? 'Текущий уровень: оклад <b class="mono">'+money(curKmBracket.value)+'</b> каждому КАЛЬЯН мастеру (месяц)'
      : 'Текущий уровень: оклад отменён — <b class="mono">'+(curKmBracket.value*100)+'%</b> от дневной выручки КАЛЬЯН каждому мастеру за отработанные смены';
    html += '<div class="kpi-panel"><h4>KPI КАЛЬЯН мастера — накопительная выручка КАЛЬЯН за месяц</h4>'
      + '<div class="bracket-ladder">' + KALYAN_BRACKETS.map((b,i)=>'<div class="bracket '+(i===bIdx?'active':'')+'">'+bracketLabel(i)+'<br>'+(b.type==='fixed'?money(b.value):(b.value*100)+'%')+'</div>').join('') + '</div>'
      + '<div class="progress-track"><div class="progress-fill" style="width:'+kProgress+'%"></div></div>'
      + '<div style="font-size:13.5px;color:var(--ink-soft)">Выручка КАЛЬЯН за месяц: <b class="mono">'+money(hookahRevenueSum)+'</b>'
      + (nextBracket ? ' · до следующего порога: '+money(nextBracket.threshold-hookahRevenueSum) : '') + '</div>'
      + '<div class="assumption-note">'+kmModeText+'. На фикс. уровнях оклад начисляется полностью и не зависит от числа смен; при переходе на % — оклад отменяется, и каждый день с отметкой «Смена» приносит % от выручки КАЛЬЯН ИМЕННО за этот день.</div></div>';

    const cpb = getChefProfitBonus(mk);
    html += '<div class="kpi-panel"><h4>Шеф-повар — % от чистой прибыли кухни (вручную)</h4>'
      + '<div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">'
      + '<span style="font-size:13.5px;color:var(--ink-soft)">Сумма 5% за месяц, ₽:</span>'
      + '<input class="plan-input" type="number" id="chef-profit-amount" value="'+(cpb.amount||'')+'" placeholder="0"/>'
      + '<label style="font-size:13.5px;display:flex;align-items:center;gap:5px;"><input type="checkbox" id="chef-profit-confirm" '+(cpb.confirmed?'checked':'')+'/> подтвердить и включить в ЗП</label>'
      + '</div><div class="assumption-note">Сумма считается вручную (по согласованной методике), пока не подключён автоматический расчёт чистой прибыли кухни. После подтверждения — попадает в столбец «Бонусы» шеф-повара.</div></div>';

    html += '<table class="month-table"><thead><tr>'
      + '<th>Сотрудник</th><th>Подразделение</th><th class="num">Смен</th><th class="num">Оклад</th>'
      + '<th class="num">Начислено сверх оклада</th><th class="num">Бонусы</th><th class="num">Начислено всего</th>'
      + '<th class="num">Аванс</th><th class="num">Вычеты</th><th class="num">К выплате</th></tr></thead><tbody>';

    let grandOclad=0, grandVar=0, grandBonus=0, grandAdvance=0, grandDeduction=0, grandTotal=0, grandToPay=0;
    DEPT_ORDER.forEach(deptKey=>{
      EMPLOYEES.filter(e=>e.dept===deptKey).forEach(e=>{
        const t = totals[e.id];
        const hasHistory = t.shiftsWorked>0 || t.variable>0 || t.oclad>0;
        if (!e.active && !hasHistory) return;
        const adj = adjTotals[e.id] || {advance:0, deduction:0, bonus:0};
        const total = (t.oclad||0)+(t.variable||0)+(t.bonuses||0);
        const toPay = total - adj.advance - adj.deduction;
        grandOclad += (t.oclad||0); grandVar += (t.variable||0); grandBonus += (t.bonuses||0);
        grandAdvance += adj.advance; grandDeduction += adj.deduction;
        grandTotal += total; grandToPay += toPay;
        // KM masters: oclad is the real bracket-level amount on fixed tiers (already summed above).
        // On percent tiers the oclad is genuinely 0/cancelled, so show the active % instead as context.
        let ocladCell = t.oclad ? money(t.oclad) : (t.kmLevelPct ? (t.kmLevelPct*100)+'%' : '—');
        if (e.role === 'kpi_hookah') ocladCell += ' <span style="font-size:10px;color:var(--ink-soft)">(KPI)</span>';
        html += '<tr'+(!e.active?' style="opacity:0.55"':'')+'>'
          + '<td>'+e.name+(!e.active?' <span style="font-size:11px;color:var(--ink-soft)">(архив)</span>':'')+'</td>'
          + '<td><span class="dept-tag" style="background:'+DEPTS[deptKey].color+'">'+DEPTS[deptKey].label+'</span></td>'
          + '<td class="num">'+t.shiftsWorked+'</td>'
          + '<td class="num">'+ocladCell+'</td>'
          + '<td class="num">'+money(t.variable)+'</td>'
          + '<td class="num">'+(t.bonuses?money(t.bonuses):'—')+'</td>'
          + '<td class="num"><b>'+money(total)+'</b></td>'
          + '<td class="num">'+(adj.advance?money(adj.advance):'—')+'</td>'
          + '<td class="num">'+(adj.deduction?money(adj.deduction):'—')+'</td>'
          + '<td class="num topay">'+money(toPay)+'</td></tr>';
      });
    });
    html += '<tr class="total-row"><td>ИТОГО ФОТ за месяц</td><td></td><td></td>'
      + '<td class="num">'+money(grandOclad)+'</td>'
      + '<td class="num">'+money(grandVar)+'</td>'
      + '<td class="num">'+money(grandBonus)+'</td>'
      + '<td class="num">'+money(grandTotal)+'</td>'
      + '<td class="num">'+money(grandAdvance)+'</td>'
      + '<td class="num">'+money(grandDeduction)+'</td>'
      + '<td class="num">'+money(grandToPay)+'</td></tr>';
    html += '</tbody></table>';

    html += renderAdjustmentsPanel(mk, adjTotals);

    document.getElementById('view-month').innerHTML = html;

    document.getElementById('month-input').addEventListener('change', async ev=>{
      const [y,m] = ev.target.value.split('-'); state.currentDate = y+'-'+m+'-01';
      await loadMonth(monthKeyOf(state.currentDate)); renderMonthView();
    });
    document.getElementById('plan-input').addEventListener('change', ev=>{
      state.plan[mk] = Number(ev.target.value)||0; scheduleSave(); renderMonthView();
    });
    document.getElementById('chef-profit-amount').addEventListener('change', ev=>{
      getChefProfitBonus(mk).amount = Number(ev.target.value)||0; scheduleSave(); renderMonthView();
    });
    document.getElementById('chef-profit-confirm').addEventListener('click', ev=>{
      getChefProfitBonus(mk).confirmed = ev.target.checked; scheduleSave(); renderMonthView();
    });
    attachAdjustmentHandlers(mk);
  }

  // ---------- Revenue (Выручка) view ----------
  function todayStr_(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function renderRevenueView(){
    const mk = monthKeyOf(state.currentDate);
    const plan = state.plan[mk];
    const totalDaysInMonth = daysInMonth(mk);
    const today = todayStr_();
    const isCurrentMonth = mk === today.slice(0,7);
    const lastDayToShow = isCurrentMonth ? Number(today.slice(8,10)) : totalDaysInMonth;
    const dailyTarget = plan ? plan / totalDaysInMonth : null;

    let html = '<div style="margin-bottom:14px;"><input class="month-select" type="month" id="revenue-month-input" value="'+mk+'"/></div>';

    // ---- сводная панель по плану ----
    let sumRevenue=0, sumCashOOO=0, sumCashIP=0;
    const rows = [];
    for (let day=1; day<=lastDayToShow; day++){
      const dt = mk+'-'+String(day).padStart(2,'0');
      const d = state.days[dt] || {};
      const revenue = Number(d.totalRevenue)||0;
      const cashOOO = Number(d.cashOOO)||0;
      const cashIP = Number(d.cashIP)||0;
      sumRevenue += revenue; sumCashOOO += cashOOO; sumCashIP += cashIP;
      const cumRevenue = sumRevenue;
      const cumTarget = dailyTarget ? dailyTarget*day : null;
      const lag = cumTarget!==null ? cumRevenue-cumTarget : null;
      rows.push({dt, day, revenue, cashOOO, cashIP, totalCash: cashOOO+cashIP, cumRevenue, cumTarget, lag, hasData: !!state.days[dt]});
    }
    const totalCash = sumCashOOO + sumCashIP;
    const finalLag = rows.length ? rows[rows.length-1].lag : null;

    html += '<div class="kpi-panel"><h4>План по выручке</h4>';
    if (plan){
      const rProgress = Math.min(100, sumRevenue/plan*100);
      html += '<div class="progress-track"><div class="progress-fill" style="width:'+rProgress+'%"></div></div>'
        + '<div style="font-size:13.5px;color:var(--ink-soft)">Выручка накоплено: <b class="mono">'+money(sumRevenue)+'</b>'
        + ' из плана <b class="mono">'+money(plan)+'</b> ('+rProgress.toFixed(0)+'%)'
        + ' · план на день <b class="mono">'+money(dailyTarget)+'</b>'
        + (finalLag!==null ? (' · '+(finalLag>=0
            ? '<span style="color:var(--green);font-weight:700">опережение плана на '+money(finalLag)+'</span>'
            : '<span style="color:var(--red);font-weight:700">отставание от плана на '+money(-finalLag)+'</span>')) : '')
        + '</div>';
    } else {
      html += '<div class="assumption-note">План на этот месяц ещё не задан. Задать его можно на вкладке «Месяц».</div>';
    }
    html += '</div>';

    html += '<table class="month-table"><thead><tr>'
      + '<th>Дата</th><th>День</th>'
      + '<th class="num">Выручка</th><th class="num">Нал. ООО</th><th class="num">Нал. ИП</th><th class="num">Итого нал.</th>'
      + '<th class="num">Накоплено</th><th class="num">План накопит.</th><th class="num">Отставание/опережение</th>'
      + '</tr></thead><tbody>';

    if (!rows.length){
      html += '<tr><td colspan="9" style="text-align:center;color:var(--ink-soft);padding:16px;">Нет данных за этот месяц</td></tr>';
    }

    rows.forEach(r=>{
      const lagCell = r.lag===null ? '—'
        : (r.lag>=0
            ? '<span style="color:var(--green);font-weight:700">+'+money(r.lag)+'</span>'
            : '<span style="color:var(--red);font-weight:700">−'+money(-r.lag)+'</span>');
      html += '<tr'+(!r.hasData?' style="opacity:0.5"':'')+'>'
        + '<td>'+r.dt.slice(8,10)+'.'+r.dt.slice(5,7)+'</td>'
        + '<td style="text-transform:uppercase;font-size:11.5px;color:var(--ink-soft)">'+weekdayShort(r.dt)+'</td>'
        + '<td class="num">'+(r.hasData?money(r.revenue):'—')+'</td>'
        + '<td class="num">'+(r.cashOOO?money(r.cashOOO):'—')+'</td>'
        + '<td class="num">'+(r.cashIP?money(r.cashIP):'—')+'</td>'
        + '<td class="num">'+(r.totalCash?money(r.totalCash):'—')+'</td>'
        + '<td class="num">'+money(r.cumRevenue)+'</td>'
        + '<td class="num">'+(r.cumTarget!==null?money(r.cumTarget):'—')+'</td>'
        + '<td class="num">'+lagCell+'</td>'
        + '</tr>';
    });

    html += '<tr class="total-row"><td>ИТОГО</td><td></td>'
      + '<td class="num">'+money(sumRevenue)+'</td>'
      + '<td class="num">'+money(sumCashOOO)+'</td>'
      + '<td class="num">'+money(sumCashIP)+'</td>'
      + '<td class="num">'+money(totalCash)+'</td>'
      + '<td class="num">'+money(sumRevenue)+'</td>'
      + '<td class="num">'+(dailyTarget!==null?money(dailyTarget*lastDayToShow):'—')+'</td>'
      + '<td class="num">'+(finalLag!==null ? (finalLag>=0?'+':'−')+money(Math.abs(finalLag)) : '—')+'</td>'
      + '</tr>';
    html += '</tbody></table>';

    if (isCurrentMonth && totalDaysInMonth > lastDayToShow){
      html += '<div class="assumption-note" style="margin-top:10px;">Показаны дни по сегодняшний включительно. Оставшиеся '+(totalDaysInMonth-lastDayToShow)+' дн. месяца появятся в таблице по мере внесения выручки.</div>';
    }

    document.getElementById('view-revenue').innerHTML = html;

    document.getElementById('revenue-month-input').addEventListener('change', async ev=>{
      const [y,m] = ev.target.value.split('-'); state.currentDate = y+'-'+m+'-01';
      await loadMonth(monthKeyOf(state.currentDate)); renderRevenueView();
    });
  }


  // ---------- Табель (Timesheet) view ----------
  function renderTimesheetView(){
    const mk = monthKeyOf(state.currentDate);

    if (!timesheetEmpId || !EMPLOYEES.find(e=>e.id===timesheetEmpId)){
      const firstActive = EMPLOYEES.find(e=>e.active) || EMPLOYEES[0];
      timesheetEmpId = firstActive ? firstActive.id : null;
    }
    const emp = EMPLOYEES.find(e=>e.id===timesheetEmpId);

    let html = '<div style="margin-bottom:14px;">'
      + '<input class="month-select" type="month" id="timesheet-month-input" value="'+mk+'"/>'
      + '</div>'
      + '<div style="margin-bottom:14px;">'
      + '<select id="timesheet-emp-select" class="month-select" style="min-width:240px;">'
      + DEPT_ORDER.map(deptKey=>{
          const list = EMPLOYEES.filter(e=>e.dept===deptKey);
          if (!list.length) return '';
          return '<optgroup label="'+DEPTS[deptKey].label+'">'
            + list.map(e=>'<option value="'+e.id+'"'+(emp && e.id===emp.id?' selected':'')+'>'+e.name+(!e.active?' (архив)':'')+'</option>').join('')
            + '</optgroup>';
        }).join('')
      + '</select>'
      + '</div>';

    if (!emp){
      html += '<div class="assumption-note">Нет сотрудников для отображения.</div>';
      document.getElementById('view-timesheet').innerHTML = html;
      return;
    }

    const curKmBracket = KALYAN_BRACKETS[findBracketIndex(monthlyHookahRevenue(mk))];
    const isHourly = emp.role === 'hourly';
    const isChef = emp.role === 'chef';

    let cols = '<th>Дата</th><th>День</th><th class="num">Смена</th>';
    if (isHourly) cols += '<th>Начало</th><th>Конец</th><th class="num">Часы</th>';
    if (isChef) cols += '<th class="num">Замещал повара</th><th>Начало подмены</th><th>Конец подмены</th><th class="num">Часы подмены</th>';
    cols += '<th class="num">Сумма за день</th>';

    html += '<table class="month-table"><thead><tr>'+cols+'</tr></thead><tbody>';

    const dim = daysInMonth(mk);
    let totalShifts=0, totalHours=0, totalCoverHours=0, totalSum=0;

    for (let d=1; d<=dim; d++){
      const dt = mk+'-'+String(d).padStart(2,'0');
      const day = getDay(dt);
      const s = day.shifts[emp.id];
      const pay = dailyPay(emp, day, curKmBracket, dt);
      const hrs = isHourly ? hoursBetween(s.timeIn, s.timeOut) : 0;
      const coverHrs = isChef ? hoursBetween(s.coverStart, s.coverEnd) : 0;

      if (s.worked) totalShifts++;
      totalHours += hrs;
      if (isChef && s.coverWorked) totalCoverHours += coverHrs;
      if (pay!==null) totalSum += pay;

      html += '<tr'+(!s.worked?' style="opacity:0.55"':'')+'>'
        + '<td class="mono">'+dt.slice(8,10)+'.'+dt.slice(5,7)+'</td>'
        + '<td style="text-transform:uppercase;font-size:11.5px;color:var(--ink-soft)">'+weekdayShort(dt)+'</td>'
        + '<td class="num"><input type="checkbox" data-ts-field="worked" data-date="'+dt+'" '+(s.worked?'checked':'')+'/></td>';

      if (isHourly){
        html += '<td><input type="time" data-ts-field="timeIn" data-date="'+dt+'" value="'+(s.timeIn||'')+'" '+(!s.worked?'disabled':'')+'/></td>'
          + '<td><input type="time" data-ts-field="timeOut" data-date="'+dt+'" value="'+(s.timeOut||'')+'" '+(!s.worked?'disabled':'')+'/></td>'
          + '<td class="num mono">'+(hrs>0?hrs:'—')+'</td>';
      }
      if (isChef){
        html += '<td class="num"><input type="checkbox" data-ts-field="coverWorked" data-date="'+dt+'" '+(s.coverWorked?'checked':'')+'/></td>'
          + '<td><input type="time" data-ts-field="coverStart" data-date="'+dt+'" value="'+(s.coverStart||'')+'" '+(!s.coverWorked?'disabled':'')+'/></td>'
          + '<td><input type="time" data-ts-field="coverEnd" data-date="'+dt+'" value="'+(s.coverEnd||'')+'" '+(!s.coverWorked?'disabled':'')+'/></td>'
          + '<td class="num mono">'+(coverHrs>0?coverHrs:'—')+'</td>';
      }

      html += '<td class="num mono">'+(pay!==null?money(pay):'по итогам месяца')+'</td></tr>';
    }

    let totalCols = 3; // Дата, День, Смена
    if (isHourly) totalCols += 3;
    if (isChef) totalCols += 4;

    html += '<tr class="total-row"><td colspan="'+totalCols+'">ИТОГО: смен — '+totalShifts
      + (isHourly ? ', часов — '+totalHours.toFixed(2) : '')
      + (isChef ? ', часов подмены — '+totalCoverHours.toFixed(2) : '')
      + '</td><td class="num">'+money(totalSum)+'</td></tr>';

    html += '</tbody></table>';
    html += '<div class="assumption-note">Табель редактируемый: отметки и время можно менять прямо здесь для сверки перед расчётом зарплаты — изменения сохраняются автоматически и отражаются на вкладках «Сегодня» и «Месяц».</div>';

    document.getElementById('view-timesheet').innerHTML = html;

    document.getElementById('timesheet-month-input').addEventListener('change', async ev=>{
      const [y,m] = ev.target.value.split('-'); state.currentDate = y+'-'+m+'-01';
      await loadMonth(monthKeyOf(state.currentDate)); renderTimesheetView();
    });
    document.getElementById('timesheet-emp-select').addEventListener('change', ev=>{
      timesheetEmpId = ev.target.value; renderTimesheetView();
    });

    document.querySelectorAll('#view-timesheet [data-ts-field="worked"]').forEach(el=>{
      el.addEventListener('change', ()=>{
        getDay(el.dataset.date).shifts[emp.id].worked = el.checked;
        scheduleSave(); renderTimesheetView();
      });
    });
    document.querySelectorAll('#view-timesheet [data-ts-field="timeIn"],#view-timesheet [data-ts-field="timeOut"]').forEach(el=>{
      el.addEventListener('change', ()=>{
        getDay(el.dataset.date).shifts[emp.id][el.dataset.tsField] = el.value;
        scheduleSave(); renderTimesheetView();
      });
    });
    document.querySelectorAll('#view-timesheet [data-ts-field="coverWorked"]').forEach(el=>{
      el.addEventListener('change', ()=>{
        getDay(el.dataset.date).shifts[emp.id].coverWorked = el.checked;
        scheduleSave(); renderTimesheetView();
      });
    });
    document.querySelectorAll('#view-timesheet [data-ts-field="coverStart"],#view-timesheet [data-ts-field="coverEnd"]').forEach(el=>{
      el.addEventListener('change', ()=>{
        getDay(el.dataset.date).shifts[emp.id][el.dataset.tsField] = el.value;
        scheduleSave(); renderTimesheetView();
      });
    });
  }

  // ---------- График смен на неделю ----------
  function renderScheduleView(){
    const monday = mondayOf(scheduleAnchor);
    const weekKey = monday;
    if (!state.scheduleWeeks[weekKey]) state.scheduleWeeks[weekKey] = { cells: {} };
    const cells = state.scheduleWeeks[weekKey].cells;

    const days = [];
    for (let i=0;i<7;i++){
      const d = new Date(monday+'T00:00:00'); d.setDate(d.getDate()+i);
      days.push(fmtDate(d));
    }

    let html = '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;">'
      + '<button class="btn secondary" id="sched-prev-week">← Пред. неделя</button>'
      + '<input class="month-select" type="date" id="sched-anchor-input" value="'+scheduleAnchor+'"/>'
      + '<button class="btn secondary" id="sched-next-week">След. неделя →</button>'
      + '<span style="font-size:13.5px;color:var(--ink-soft);">Неделя '+days[0].slice(8,10)+'.'+days[0].slice(5,7)+' – '+days[6].slice(8,10)+'.'+days[6].slice(5,7)+'</span>'
      + '</div>';

    html += '<table class="month-table schedule-table"><colgroup><col style="width:16%"/>'
      + days.map(()=>'<col style="width:12%"/>').join('')
      + '</colgroup><thead><tr><th>Позиция</th>';
    days.forEach(dt=>{
      html += '<th style="text-align:center;"><div>'+weekdayShort(dt).toUpperCase()+'</div>'
        + '<div class="mono" style="font-weight:400;font-size:11px;">'+dt.slice(8,10)+'.'+dt.slice(5,7)+'</div></th>';
    });
    html += '</tr></thead><tbody>';

    SCHEDULE_SLOTS.forEach(slot=>{
      html += '<tr>'
        + '<td>'
        + '<div style="display:flex;align-items:flex-start;gap:4px;">'
        + '<div style="min-width:0;flex:1;">'
        + '<input type="text" class="sched-slot-label" data-slot="'+slot.id+'" value="'+slot.label+'" style="width:100%;font-weight:600;border:none;background:transparent;padding:2px 0;"/>'
        + '<input type="text" class="sched-slot-time" data-slot="'+slot.id+'" value="'+(slot.time||'')+'" placeholder="время" style="width:100%;font-size:11.5px;color:var(--ink-soft);border:none;background:transparent;padding:0;"/>'
        + '</div>'
        + '<span class="sched-del" data-slot="'+slot.id+'" style="cursor:pointer;color:var(--text-faint);font-weight:700;flex-shrink:0;padding:2px 0;" title="Удалить строку">✕</span>'
        + '</div>'
        + '</td>';
      days.forEach(dt=>{
        const key = slot.id+'__'+dt;
        const val = cells[key] || '';
        html += '<td><select class="sched-cell" data-key="'+key+'">'
          + '<option value=""'+(!val?' selected':'')+'>—</option>'
          + DEPT_ORDER.map(deptKey=>{
              const list = EMPLOYEES.filter(e=>e.dept===deptKey && e.active);
              if (!list.length) return '';
              return '<optgroup label="'+DEPTS[deptKey].label+'">'
                + list.map(e=>'<option value="'+e.id+'"'+(val===e.id?' selected':'')+'>'+e.name+'</option>').join('')
                + '</optgroup>';
            }).join('')
          + '</select></td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    html += '<div style="margin-top:10px;"><button class="btn secondary" id="sched-add-slot">+ Добавить строку</button></div>';
    html += '<div class="assumption-note">Выберите сотрудника из списка на нужный день (список сгруппирован по подразделениям, доступны все активные сотрудники) — «—», если в этот день позиция не занята. Название и время позиции слева можно менять свободно. Всё сохраняется автоматически.</div>';

    document.getElementById('view-schedule').innerHTML = html;

    document.getElementById('sched-prev-week').addEventListener('click', async ()=>{
      const d = new Date(scheduleAnchor+'T00:00:00'); d.setDate(d.getDate()-7); scheduleAnchor = fmtDate(d);
      await loadScheduleWeek(mondayOf(scheduleAnchor)); renderScheduleView();
    });
    document.getElementById('sched-next-week').addEventListener('click', async ()=>{
      const d = new Date(scheduleAnchor+'T00:00:00'); d.setDate(d.getDate()+7); scheduleAnchor = fmtDate(d);
      await loadScheduleWeek(mondayOf(scheduleAnchor)); renderScheduleView();
    });
    document.getElementById('sched-anchor-input').addEventListener('change', async ev=>{
      scheduleAnchor = ev.target.value;
      await loadScheduleWeek(mondayOf(scheduleAnchor)); renderScheduleView();
    });

    document.querySelectorAll('.sched-cell').forEach(el=>{
      el.addEventListener('change', ()=>{
        cells[el.dataset.key] = el.value;
        scheduleSaveWeek(weekKey);
      });
    });
    document.querySelectorAll('.sched-slot-label').forEach(el=>{
      el.addEventListener('change', ()=>{
        const slot = SCHEDULE_SLOTS.find(s=>s.id===el.dataset.slot);
        if (slot){ slot.label = el.value; scheduleSaveConfig(); }
      });
    });
    document.querySelectorAll('.sched-slot-time').forEach(el=>{
      el.addEventListener('change', ()=>{
        const slot = SCHEDULE_SLOTS.find(s=>s.id===el.dataset.slot);
        if (slot){ slot.time = el.value; scheduleSaveConfig(); }
      });
    });
    document.querySelectorAll('.sched-del').forEach(el=>{
      el.addEventListener('click', ()=>{
        SCHEDULE_SLOTS = SCHEDULE_SLOTS.filter(s=>s.id!==el.dataset.slot);
        scheduleSaveConfig();
        renderScheduleView();
      });
    });
    document.getElementById('sched-add-slot').addEventListener('click', ()=>{
      SCHEDULE_SLOTS.push({id:uid(), label:'Новая позиция', time:''});
      scheduleSaveConfig();
      renderScheduleView();
    });
  }

  // ---------- Задачи и чат руководителей ----------
  function renderTeamworkView(){
    const monday = mondayOf(taskAnchor);
    const weekKey = monday;
    if (!state.tasksWeeks[weekKey]) state.tasksWeeks[weekKey] = { tasks: [] };
    if (!state.chatMessages) state.chatMessages = [];
    const tasks = state.tasksWeeks[weekKey].tasks;
    const authorName = getAuthorName();

    const days = [];
    for (let i=0;i<7;i++){ const d = new Date(monday+'T00:00:00'); d.setDate(d.getDate()+i); days.push(fmtDate(d)); }

    let html = '<div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">'
      + '<label style="font-size:12.5px;color:var(--ink-soft);">Ваше имя: <input type="text" id="tw-author" value="'+(authorName||'')+'" placeholder="Имя Фамилия" style="margin-left:6px;padding:5px 8px;border:1px solid var(--border-input);border-radius:6px;width:180px;"/></label>'
      + '</div>';

    html += '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;">'
      + '<button class="btn secondary" id="tw-prev-week">← Пред. неделя</button>'
      + '<input class="month-select" type="date" id="tw-anchor-input" value="'+taskAnchor+'"/>'
      + '<button class="btn secondary" id="tw-next-week">След. неделя →</button>'
      + '<span style="font-size:12.5px;color:var(--ink-soft);">Неделя '+days[0].slice(8,10)+'.'+days[0].slice(5,7)+' – '+days[6].slice(8,10)+'.'+days[6].slice(5,7)+'</span>'
      + '</div>';

    // ---- Форма новой задачи ----
    html += '<div class="kpi-panel"><h4>Новая задача</h4>'
      + '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">'
      + '<select id="tw-new-dept" class="month-select" style="min-width:140px;">'
      + TASK_DEPTS.map(d=>'<option value="'+d.id+'">'+d.label+'</option>').join('')
      + '</select>'
      + '<input type="text" id="tw-new-title" placeholder="Что нужно сделать" style="flex:1;min-width:200px;padding:8px 10px;border:1px solid var(--border-input);border-radius:6px;"/>'
      + '</div>'
      + '<textarea id="tw-new-desc" placeholder="Подробности (необязательно)" style="width:100%;margin-top:8px;min-height:56px;padding:8px 10px;border:1px solid var(--border-input);border-radius:6px;font-family:inherit;"></textarea>'
      + '<div style="display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;">'
      + '<label class="btn secondary" style="cursor:pointer;">📎 Прикрепить файл<input type="file" id="tw-new-file" style="display:none"/></label>'
      + '<span id="tw-new-file-status" style="font-size:11.5px;color:var(--ink-soft);"></span>'
      + '<button class="btn" id="tw-new-add" style="margin-left:auto;">+ Добавить задачу</button>'
      + '</div></div>';

    // ---- Доска задач по цехам ----
    html += '<div class="task-board">';
    TASK_DEPTS.forEach(dept=>{
      const deptTasks = tasks.filter(t=>t.dept===dept.id);
      html += '<div class="task-column"><h4>'+dept.label+' <span style="font-weight:400;color:var(--ink-soft);font-size:11px;">('+deptTasks.length+')</span></h4>';
      if (!deptTasks.length){
        html += '<div class="assumption-note">Нет задач на эту неделю.</div>';
      }
      deptTasks.forEach(t=>{
        const sm = taskStatusMeta(t.status);
        html += '<div class="task-card">'
          + '<div class="task-card-title">'+t.title+'</div>'
          + (t.description ? '<div class="task-card-desc">'+t.description+'</div>' : '')
          + '<div style="margin-top:6px;">'
          + '<select class="task-status" data-id="'+t.id+'" style="background:'+sm.color+'22;color:'+sm.color+';border-color:'+sm.color+'55;font-weight:600;">'
          + TASK_STATUSES.map(s=>'<option value="'+s.id+'"'+(s.id===t.status?' selected':'')+'>'+s.label+'</option>').join('')
          + '</select></div>'
          + (t.status==='failed' ? '<textarea class="task-fail-reason" data-id="'+t.id+'" placeholder="Причина невыполнения" style="width:100%;margin-top:6px;min-height:40px;padding:6px 8px;border:1px solid var(--red);border-radius:6px;font-family:inherit;font-size:12px;">'+(t.failReason||'')+'</textarea>' : '')
          + (t.file ? '<div style="margin-top:6px;"><a href="'+t.file.url+'" target="_blank" rel="noopener" style="font-size:11.5px;">📎 '+t.file.name+'</a></div>' : '')
          + '<div class="task-card-meta">'+(t.author||'—')+' · '+fmtDateTime_(t.createdAt)+' <span class="task-del" data-id="'+t.id+'" style="float:right;cursor:pointer;color:var(--text-faint);">✕</span></div>'
          + '</div>';
      });
      html += '</div>';
    });
    html += '</div>';

    // ---- Чат руководителей ----
    html += '<div class="kpi-panel" style="margin-top:18px;"><h4>Чат руководителей</h4>';
    html += '<div class="chat-log" id="tw-chat-log">';
    if (!state.chatMessages.length){
      html += '<div class="assumption-note">Сообщений пока нет.</div>';
    }
    state.chatMessages.forEach(m=>{
      html += '<div class="chat-msg">'
        + '<div class="chat-msg-meta"><b>'+(m.author||'—')+'</b> · '+fmtDateTime_(m.createdAt)+'</div>'
        + (m.text ? '<div class="chat-msg-text">'+m.text+'</div>' : '')
        + (m.file ? '<div><a href="'+m.file.url+'" target="_blank" rel="noopener" style="font-size:11.5px;">📎 '+m.file.name+'</a></div>' : '')
        + '</div>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;">'
      + '<input type="text" id="tw-chat-text" placeholder="Написать сообщение…" style="flex:1;min-width:200px;padding:8px 10px;border:1px solid var(--border-input);border-radius:6px;"/>'
      + '<label class="btn secondary" style="cursor:pointer;">📎<input type="file" id="tw-chat-file" style="display:none"/></label>'
      + '<span id="tw-chat-file-status" style="font-size:11.5px;color:var(--ink-soft);"></span>'
      + '<button class="btn" id="tw-chat-send">Отправить</button>'
      + '</div></div>';

    document.getElementById('view-teamwork').innerHTML = html;
    const chatLogEl = document.getElementById('tw-chat-log');
    chatLogEl.scrollTop = chatLogEl.scrollHeight;

    // ---- Обработчики ----
    document.getElementById('tw-author').addEventListener('change', ev=>{ setAuthorName(ev.target.value.trim()); });

    document.getElementById('tw-prev-week').addEventListener('click', async ()=>{
      const d = new Date(taskAnchor+'T00:00:00'); d.setDate(d.getDate()-7); taskAnchor = fmtDate(d);
      await loadTasksWeek(mondayOf(taskAnchor)); renderTeamworkView();
    });
    document.getElementById('tw-next-week').addEventListener('click', async ()=>{
      const d = new Date(taskAnchor+'T00:00:00'); d.setDate(d.getDate()+7); taskAnchor = fmtDate(d);
      await loadTasksWeek(mondayOf(taskAnchor)); renderTeamworkView();
    });
    document.getElementById('tw-anchor-input').addEventListener('change', async ev=>{
      taskAnchor = ev.target.value;
      await loadTasksWeek(mondayOf(taskAnchor)); renderTeamworkView();
    });

    document.getElementById('tw-new-file').addEventListener('change', async ev=>{
      const file = ev.target.files[0]; if (!file) return;
      const statusEl = document.getElementById('tw-new-file-status');
      statusEl.textContent = 'Загрузка файла…';
      try { pendingTaskFile = await uploadFileToSheet(file); statusEl.textContent = '📎 '+pendingTaskFile.name; }
      catch(err){ statusEl.textContent = 'Не удалось загрузить: '+err.message; pendingTaskFile = null; }
    });
    document.getElementById('tw-new-add').addEventListener('click', ()=>{
      const dept = document.getElementById('tw-new-dept').value;
      const title = document.getElementById('tw-new-title').value.trim();
      if (!title) return;
      const desc = document.getElementById('tw-new-desc').value.trim();
      tasks.push({
        id: uid(), dept, title, description: desc, status:'in_progress', failReason:'',
        file: pendingTaskFile, author: getAuthorName(), createdAt: Date.now()
      });
      pendingTaskFile = null;
      saveTasksWeek(weekKey);
      renderTeamworkView();
    });

    document.querySelectorAll('.task-status').forEach(el=>{
      el.addEventListener('change', ()=>{
        const t = tasks.find(x=>x.id===el.dataset.id); if (!t) return;
        t.status = el.value;
        saveTasksWeek(weekKey);
        renderTeamworkView();
      });
    });
    document.querySelectorAll('.task-fail-reason').forEach(el=>{
      el.addEventListener('change', ()=>{
        const t = tasks.find(x=>x.id===el.dataset.id); if (!t) return;
        t.failReason = el.value;
        saveTasksWeek(weekKey);
      });
    });
    document.querySelectorAll('.task-del').forEach(el=>{
      el.addEventListener('click', ()=>{
        const idx = tasks.findIndex(x=>x.id===el.dataset.id);
        if (idx!==-1) tasks.splice(idx,1);
        saveTasksWeek(weekKey);
        renderTeamworkView();
      });
    });

    document.getElementById('tw-chat-file').addEventListener('change', async ev=>{
      const file = ev.target.files[0]; if (!file) return;
      const statusEl = document.getElementById('tw-chat-file-status');
      statusEl.textContent = 'Загрузка файла…';
      try { pendingChatFile = await uploadFileToSheet(file); statusEl.textContent = '📎 '+pendingChatFile.name; }
      catch(err){ statusEl.textContent = 'Не удалось загрузить: '+err.message; pendingChatFile = null; }
    });
    document.getElementById('tw-chat-send').addEventListener('click', ()=>{
      const textEl = document.getElementById('tw-chat-text');
      const text = textEl.value.trim();
      if (!text && !pendingChatFile) return;
      state.chatMessages.push({ id: uid(), author: getAuthorName(), text, file: pendingChatFile, createdAt: Date.now() });
      pendingChatFile = null;
      saveChat();
      renderTeamworkView();
    });
    document.getElementById('tw-chat-text').addEventListener('keydown', ev=>{
      if (ev.key === 'Enter'){ document.getElementById('tw-chat-send').click(); }
    });
  }
  function fmtDateTime_(ts){
    if (!ts) return '';
    const d = new Date(ts);
    return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  // ---------- Аутсорс-точки КАЛЬЯН ----------
  function renderOutsourceView(){
    const mk = monthKeyOf(state.currentDate);
    const dim = daysInMonth(mk);
    const emps = outsourceEmployees();

    let html = '<div style="margin-bottom:14px;"><input class="month-select" type="month" id="outsource-month-input" value="'+mk+'"/></div>';

    let grandNetProfit = 0, grandRevenue = 0, grandSales = 0, grandPayroll = 0;
    const perLocationTotals = {};

    OUTSOURCE_LOCATIONS.forEach(loc=>{
      let locSales=0, locRevenue=0, locNetProfit=0, locPayroll=0;

      let rows = '';
      for (let d=1; d<=dim; d++){
        const dt = mk+'-'+String(d).padStart(2,'0');
        const dayData = getOutsourceDay(dt);
        const entry = dayData[loc.id];
        const sales = Number(entry.sales)||0;
        const revenue = sales*OUTSOURCE_HOOKAH_PRICE;
        const netProfit = revenue*OUTSOURCE_NET_SHARE;
        const salary = entry.employeeId ? (OUTSOURCE_SHIFT_RATE + sales*OUTSOURCE_SALE_RATE) : 0;
        locSales += sales; locRevenue += revenue; locNetProfit += netProfit; locPayroll += salary;

        rows += '<tr'+(!entry.employeeId?' style="opacity:0.55"':'')+'>'
          + '<td class="mono">'+dt.slice(8,10)+'.'+dt.slice(5,7)+'</td>'
          + '<td style="text-transform:uppercase;font-size:10px;color:var(--ink-soft)">'+weekdayShort(dt)+'</td>'
          + '<td><select class="outs-emp" data-loc="'+loc.id+'" data-date="'+dt+'">'
          + '<option value=""'+(!entry.employeeId?' selected':'')+'>—</option>'
          + emps.map(e=>'<option value="'+e.id+'"'+(entry.employeeId===e.id?' selected':'')+'>'+e.name+'</option>').join('')
          + '</select></td>'
          + '<td class="num"><input type="number" class="outs-sales" data-loc="'+loc.id+'" data-date="'+dt+'" value="'+(sales||'')+'" min="0" style="width:100%;text-align:right;padding:4px 6px;border:1px solid var(--border-input);border-radius:5px;" '+(!entry.employeeId?'disabled':'')+'/></td>'
          + '<td class="num mono">'+money(revenue)+'</td>'
          + '<td class="num mono">'+money(netProfit)+'</td>'
          + '<td class="num mono">'+(salary?money(salary):'—')+'</td>'
          + '</tr>';
      }

      grandSales += locSales; grandRevenue += locRevenue; grandNetProfit += locNetProfit; grandPayroll += locPayroll;
      perLocationTotals[loc.id] = {sales:locSales, revenue:locRevenue, netProfit:locNetProfit, payroll:locPayroll};

      const isCollapsed = !!outsourceCollapsed[loc.id];
      html += '<div class="kpi-panel">'
        + '<h4 class="outs-loc-toggle" data-loc="'+loc.id+'" style="cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none;">'
        + '<span style="display:inline-block;transition:transform 0.15s;transform:rotate('+(isCollapsed?'-90deg':'0deg')+');">▾</span>'
        + '<span>'+loc.label+'</span>'
        + '<span style="font-weight:400;color:var(--ink-soft);font-size:11px;">(продано '+locSales+' · чистыми '+money(locNetProfit)+')</span>'
        + '</h4>'
        + (isCollapsed ? '' :
          '<table class="month-table"><thead><tr>'
          + '<th>Дата</th><th>День</th><th>Сотрудник</th><th class="num">Продажи</th>'
          + '<th class="num">Выручка</th><th class="num">Чистая прибыль</th><th class="num">ЗП сотрудника</th></tr></thead><tbody>'
          + rows
          + '<tr class="total-row"><td colspan="3">ИТОГО по точке</td>'
          + '<td class="num">'+locSales+'</td>'
          + '<td class="num">'+money(locRevenue)+'</td>'
          + '<td class="num">'+money(locNetProfit)+'</td>'
          + '<td class="num">'+money(locPayroll)+'</td></tr>'
          + '</tbody></table>')
        + '</div>';
    });

    html += '<div class="kpi-panel"><h4>Итого по всем 3 точкам аутсорса КАЛЬЯН за месяц</h4>'
      + '<div style="display:flex;gap:24px;flex-wrap:wrap;font-size:13px;">'
      + '<div>Продано кальянов: <b class="mono">'+grandSales+'</b></div>'
      + '<div>Общая выручка: <b class="mono">'+money(grandRevenue)+'</b></div>'
      + '<div>ФОТ сотрудников аутсорса: <b class="mono">'+money(grandPayroll)+'</b></div>'
      + '<div>Наша чистая прибыль (60%): <b class="mono" style="color:var(--rust);font-size:15px;">'+money(grandNetProfit)+'</b></div>'
      + '</div>'
      + '<div class="assumption-note">Цена кальяна — '+money(OUTSOURCE_HOOKAH_PRICE)+', наша доля — '+(OUTSOURCE_NET_SHARE*100)+'% от выручки точки. Зарплата сотрудника: '+money(OUTSOURCE_SHIFT_RATE)+' за выход + '+money(OUTSOURCE_SALE_RATE)+' за каждую продажу — попадает в общий ФОТ на вкладке «Месяц» автоматически.</div>'
      + '</div>';

    document.getElementById('view-outsource').innerHTML = html;

    document.getElementById('outsource-month-input').addEventListener('change', async ev=>{
      const [y,m] = ev.target.value.split('-'); state.currentDate = y+'-'+m+'-01';
      await loadMonth(monthKeyOf(state.currentDate)); renderOutsourceView();
    });
    document.querySelectorAll('.outs-loc-toggle').forEach(el=>{
      el.addEventListener('click', ()=>{
        const loc = el.dataset.loc;
        outsourceCollapsed[loc] = !outsourceCollapsed[loc];
        renderOutsourceView();
      });
    });
    document.querySelectorAll('.outs-emp').forEach(el=>{
      el.addEventListener('change', ()=>{
        const dayData = getOutsourceDay(el.dataset.date);
        dayData[el.dataset.loc].employeeId = el.value;
        scheduleSave();
        renderOutsourceView();
      });
    });
    document.querySelectorAll('.outs-sales').forEach(el=>{
      el.addEventListener('change', ()=>{
        const dayData = getOutsourceDay(el.dataset.date);
        dayData[el.dataset.loc].sales = Number(el.value)||0;
        scheduleSave();
        renderOutsourceView();
      });
    });
  }

          + (r.item.tag==='monthly_breakage' ? '<span class="badge" style="background:var(--bg-chip-off);color:var(--ink-soft)">авто</span>' : '')
          + (r.item.tag==='bulk_advance' ? '<span class="badge" style="background:var(--bg-chip-off);color:var(--ink-soft)">массово</span>' : '')
          + '<span>'+r.emp.name+'</span>'

      }).join('') + '</div>';
    } else {
      html += '<div class="assumption-note">Записей пока нет.</div>';
    }
    html += '</div>';
    return html;

  function attachAdjustmentHandlers(mk){
    const root = document.getElementById('view-month');
    const breakageBtn = root.querySelector('#breakage-apply');
    if (breakageBtn){
      breakageBtn.addEventListener('click', ()=>{
        const amount = Number(root.querySelector('#breakage-amount').value)||0;
        if (amount<=0) return;
        applyMonthlyBreakage(mk, amount);
        scheduleSave(); renderMonthView();
      });
    }
    const bulkBtn = root.querySelector('#bulk-advance-apply');
    if (bulkBtn){
      bulkBtn.addEventListener('click', ()=>{
        const amount = Number(root.querySelector('#bulk-advance-amount').value)||0;
        const deptFilter = root.querySelector('#bulk-advance-dept').value;
        if (amount<=0) return;
        applyBulkAdvance(mk, amount, deptFilter);
        scheduleSave(); renderMonthView();
      });
    }
    const bonusBtn = root.querySelector('#bonus-add');
    if (bonusBtn){
      bonusBtn.addEventListener('click', ()=>{
        const empId = root.querySelector('#bonus-emp').value;
        const amount = Number(root.querySelector('#bonus-amount').value)||0;
        const note = root.querySelector('#bonus-note').value;
        if (amount<=0) return;
        const adj = getAdjustments(mk);
        if (!adj[empId]) adj[empId]=[];
        adj[empId].push({id:uid(), type:'bonus', amount, note: note||'Премия'});
        scheduleSave(); renderMonthView();
      });
    }
    const addBtn = root.querySelector('#adj-add');
    if (addBtn){
      addBtn.addEventListener('click', ()=>{
        const empId = root.querySelector('#adj-emp').value;
        const type = root.querySelector('#adj-type').value;
        const amount = Number(root.querySelector('#adj-amount').value)||0;
        const note = root.querySelector('#adj-note').value;
        if (amount<=0) return;
        const adj = getAdjustments(mk);
        if (!adj[empId]) adj[empId]=[];
        adj[empId].push({id:uid(), type, amount, note});
        scheduleSave(); renderMonthView();
      });
    }
    root.querySelectorAll('[data-act="del-adj"]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const adj = getAdjustments(mk);
        const empId = el.dataset.emp;
        adj[empId] = (adj[empId]||[]).filter(item=>item.id!==el.dataset.id);
        scheduleSave(); renderMonthView();
      });
    });
  }

  function setNested(obj, path, value){
    const parts = path.split('.');
    let cur = obj;
    for (let i=0;i<parts.length-1;i++){ cur = cur[parts[i]]; }
    cur[parts[parts.length-1]] = value;
  }

  function attachSettingsHandlers(){
    const root = document.getElementById('view-settings');
    root.querySelector('#tg-save-btn').addEventListener('click', ()=>{
      TELEGRAM_BOT_TOKEN = root.querySelector('#tg-bot-token').value.trim();
      TELEGRAM_CHAT_ID = root.querySelector('#tg-chat-id').value.trim();
      scheduleSaveConfig();
      const statusEl = root.querySelector('#tg-save-status');
      statusEl.textContent = 'Сохранено ✓';
      statusEl.style.color = 'var(--green)';
    });

    root.querySelectorAll('[data-bracket]').forEach(row=>{
      const idx = Number(row.dataset.bracket);
      const thresholdInp = row.querySelector('[data-bracket-field="threshold"]');
      if (thresholdInp){
        thresholdInp.addEventListener('change', ()=>{
          updateBracketThreshold(idx, thresholdInp.value);
          scheduleSaveConfig(); renderSettingsView();
        });
      }
      const typeSel = row.querySelector('[data-bracket-field="type"]');
      typeSel.addEventListener('change', ()=>{
        KALYAN_BRACKETS[idx].type = typeSel.value;
        KALYAN_BRACKETS[idx].value = typeSel.value==='fixed' ? 45000 : 0.1;
        scheduleSaveConfig(); renderSettingsView();
      });
      const valInp = row.querySelector('[data-bracket-field="value"]');
      if (valInp) valInp.addEventListener('change', ()=>{ KALYAN_BRACKETS[idx].value = Number(valInp.value)||0; scheduleSaveConfig(); renderSettingsView(); });
      const valPctInp = row.querySelector('[data-bracket-field="value_pct"]');
      if (valPctInp) valPctInp.addEventListener('change', ()=>{ KALYAN_BRACKETS[idx].value = (Number(valPctInp.value)||0)/100; scheduleSaveConfig(); renderSettingsView(); });
      const removeBtn = row.querySelector('[data-act="remove-bracket"]');
      if (removeBtn) removeBtn.addEventListener('click', ()=>{ removeKalyanBracket(); scheduleSaveConfig(); renderSettingsView(); });
    });
    const addBracketBtn = root.querySelector('#add-bracket');
    if (addBracketBtn) addBracketBtn.addEventListener('click', ()=>{ addKalyanBracket(); scheduleSaveConfig(); renderSettingsView(); });

    root.querySelector('#new-emp-name').addEventListener('input', e=>{ newEmpDraft.name = e.target.value; });
    root.querySelector('#new-emp-dept').addEventListener('change', e=>{ newEmpDraft.dept = e.target.value; });
    root.querySelector('#new-emp-role').addEventListener('change', e=>{ newEmpDraft.role = e.target.value; });
    root.querySelector('#new-emp-add').addEventListener('click', ()=>{
      const name = newEmpDraft.name.trim();
      if (!name) return;
      const emp = Object.assign({id:uid(), name, dept:newEmpDraft.dept, role:newEmpDraft.role, active:true}, defaultParamsForRole(newEmpDraft.role));
      EMPLOYEES.push(emp);
      newEmpDraft = {name:'', dept:newEmpDraft.dept, role:newEmpDraft.role};
      scheduleSaveConfig(); renderSettingsView();
    });

    root.querySelectorAll('.settings-row[data-emp]').forEach(row=>{
      const empId = row.dataset.emp;
      const emp = EMPLOYEES.find(x=>x.id===empId);

      row.querySelector('[data-field="name"]').addEventListener('change', e=>{ emp.name=e.target.value; scheduleSaveConfig(); renderSettingsView(); });
      row.querySelector('[data-field="dept"]').addEventListener('change', e=>{ emp.dept=e.target.value; scheduleSaveConfig(); renderSettingsView(); });
      row.querySelector('[data-field="role"]').addEventListener('change', e=>{
        const newRole = e.target.value;
        Object.keys(emp).forEach(k=>{ if (!['id','name','dept','role','active'].includes(k)) delete emp[k]; });
        Object.assign(emp, defaultParamsForRole(newRole));
        emp.role = newRole;
        scheduleSaveConfig(); renderSettingsView();
      });
      row.querySelectorAll('[data-field]').forEach(inp=>{
        const field = inp.dataset.field;
        if (['name','dept','role'].includes(field)) return;
        inp.addEventListener('change', ()=>{
          if (field==='percent_pct'){ emp.percent = (Number(inp.value)||0)/100; }
          else { setNested(emp, field, Number(inp.value)||0); }
          scheduleSaveConfig(); renderSettingsView();
        });
      });
      const toggleBtn = row.querySelector('[data-act="toggle-active"]');
      if (toggleBtn){
        toggleBtn.addEventListener('click', ()=>{ emp.active = !emp.active; scheduleSaveConfig(); renderSettingsView(); });
      }
    });
  }

  function switchTab(tab){
    activeTab = tab;
    document.querySelectorAll('#payroll-root .tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
    document.getElementById('view-day').style.display = tab==='day' ? '' : 'none';
    document.getElementById('view-revenue').style.display = tab==='revenue' ? '' : 'none';
    document.getElementById('view-month').style.display = tab==='month' ? '' : 'none';
    document.getElementById('view-timesheet').style.display = tab==='timesheet' ? '' : 'none';
    document.getElementById('view-schedule').style.display = tab==='schedule' ? '' : 'none';
    document.getElementById('view-teamwork').style.display = tab==='teamwork' ? '' : 'none';
    document.getElementById('view-outsource').style.display = tab==='outsource' ? '' : 'none';
    document.getElementById('view-pnl').style.display = tab==='pnl' ? '' : 'none';
    document.getElementById('view-settings').style.display = tab==='settings' ? '' : 'none';
    if (tab==='day') renderDayView();
    if (tab==='revenue') renderRevenueView();
    if (tab==='month') renderMonthView();
    if (tab==='timesheet') renderTimesheetView();
    if (tab==='schedule') { loadScheduleWeek(mondayOf(scheduleAnchor)).then(renderScheduleView); }
    if (tab==='teamwork') { Promise.all([loadTasksWeek(mondayOf(taskAnchor)), loadChat()]).then(renderTeamworkView); }
    if (tab==='outsource') { loadMonth(monthKeyOf(state.currentDate)).then(renderOutsourceView); }
    if (tab==='pnl') renderPnlView();
    if (tab==='settings') renderSettingsView();
  }

  const themeToggleBtn = document.getElementById('theme-toggle');
  function applyTheme(theme){
    const root = document.getElementById('payroll-root');
    const isDark = theme === 'dark';
    root.classList.toggle('theme-dark', isDark);
    document.body.classList.toggle('theme-dark', isDark);
    themeToggleBtn.textContent = isDark ? '☀️' : '🌙';
  }
  function initTheme(){
    let saved = null;
    try { saved = window.localStorage.getItem('payroll-theme'); } catch(e){}
    if (!saved){
      saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    applyTheme(saved);
  }
  themeToggleBtn.addEventListener('click', ()=>{
    const isDark = document.getElementById('payroll-root').classList.contains('theme-dark');
    const next = isDark ? 'light' : 'dark';
    applyTheme(next);
    try { window.localStorage.setItem('payroll-theme', next); } catch(e){}
  });

      t.style.display = hide ? 'none' : '';

  });
  document.addEventListener('click', (ev)=>{
    if (accessPanel.style.display !== 'none' && !accessPanel.contains(ev.target) && ev.target.id !== 'access-lock-btn'){
      accessPanel.style.display = 'none';
    }
  });

  applyAccessMode();

  // ---------- Init ----------
  (async function init(){
    await loadConfig();
    await loadMonth(monthKeyOf(state.currentDate));
    if (state.plan[monthKeyOf(state.currentDate)] === undefined){
      state.plan[monthKeyOf(state.currentDate)] = DEFAULT_REVENUE_PLAN;
    }
    renderDayView();
  })();

})();
</script>
<script>
  // Регистрация service worker — вне основного IIFE, чтобы не зависеть от
  // остальной логики приложения; если что-то пойдёт не так, приложение
  // всё равно продолжит нормально работать без него.
  if ('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
    });
  }
</script>
</body>
